<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr | Профиль и Топот</title>
    <link rel="icon" type="image/png" href="favicon.png"> <style>
        :root {
            --vktr-red: #ff4141; /* Твой фирменный красный */
            --vktr-bg: #050505;
            --vktr-panel: #0f0f0f;
        }
        body {
            background-color: var(--vktr-bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--vktr-panel);
            border: 1px solid var(--vktr-red);
            border-radius: 15px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 0 15px rgba(255, 65, 65, 0.1);
        }
        .header { text-align: center; margin-bottom: 25px; }
        .avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 2px solid var(--vktr-red);
            margin-bottom: 10px;
        }
        /* Стилизация блоков данных */
        .data-card {
            background: #151515;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid var(--vktr-red);
        }
        .label { color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-weight: bold; font-size: 16px; }
        
        /* Секция ТОПОТ */
        .topot-status {
            background: rgba(255, 65, 65, 0.05);
            border: 1px dashed var(--vktr-red);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }
        .topot-btn {
            background: var(--vktr-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }
        .topot-info { font-size: 11px; color: #888; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="avatar.png" alt="Виктор" class="avatar"> <h2 style="margin: 0;">Виктор</h2>
        <span style="color: var(--vktr-red); font-size: 12px;">Статус: В сети</span>
    </div>

    <div class="data-card">
        <div>
            <div class="label">Идентификатор</div>
            <div class="value">vktrID: 123456</div>
        </div>
        <img src="vktrID_icon.png" width="30" alt="ID">
    </div>

    <div class="topot-status">
        <div style="font-size: 24px;">👣</div>
        <div class="label" style="color: var(--vktr-red);">Функция ТОПОТ</div>
        <div class="value" style="margin: 5px 0;">Активность: Скрыта</div>
        
        <button class="topot-btn">ОСТАВИТЬ СЛЕД</button>
        <div class="topot-info">
            Нажми, чтобы люди могли следить за твоей активностью, лайкать и комментировать твои действия.
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button style="flex: 1; background: #222; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 5px; cursor: pointer;">Настройки</button>
        <button style="flex: 1; background: #222; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 5px; cursor: pointer;">Друзья</button>
    </div>
</div>

</body>
</html>
