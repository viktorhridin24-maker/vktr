<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | ЭкстроВход</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; --header-bg: #222; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        header { position: fixed; top: 0; width: 100%; height: 48px; background: var(--header-bg); border-bottom: 1px solid #444; display: flex; justify-content: center; z-index: 1000; }
        .h-content { width: 1000px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .h-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 30px; cursor: pointer; }
        .h-right { display: flex; align-items: center; gap: 20px; }
        .h-icon { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 14px; color: #fff; text-decoration: none; }
        .h-icon:hover { opacity: 1; }
        .container { width: 1000px; margin-top: 65px; display: flex; gap: 20px; }
        nav { width: 180px; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { padding: 7px 10px; color: #d1d1d1; cursor: pointer; font-size: 13px; border-radius: 4px; }
        nav li:hover { background: #222; color: #fff; }
        main { flex-grow: 1; background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 4px; min-height: 400px; }
        .search-box { max-width: 400px; margin: 30px auto; background: #111; padding: 30px; border: 1px solid #333; border-radius: 6px; text-align: center; }
        .vktrq-logo { max-width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1)); }
        .input-field { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; outline: none; font-family: tahoma, sans-serif; }
        .btn-search { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; font-size: 13px; transition: 0.3s; }
        .vktr-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .vktr-modal-content { background: #1a1a1a; padding: 30px; border-radius: 8px; border: 1px solid var(--accent); width: 360px; text-align: center; }
        .btn-yes { background: #00cc44; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-no { background: #333; color: #ccc; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <div class="h-left">
            <img src="WhiteLogoVKTR.png" alt="VKTR" class="logo-img" onclick="location.href='feed.html'">
            <div style="display: flex; gap: 15px; font-size: 13px;">
                <a href="#" style="color: #aaa; text-decoration: none;">Поиск</a>
                <a href="#" style="color: #aaa; text-decoration: none;">Блог</a>
            </div>
        </div>
        <div class="h-right">
            <div class="h-icon" onclick="location.href='login.html'">👤 Войти</div>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul>
            <li onclick="location.href='login.html'">Главная</li>
            <li style="color: var(--accent); font-weight: bold;">🔍 vktrQ Обыск</li>
        </ul>
    </nav>
    <main>
        <div class="search-box">
            <img src="ExtraLogIn.png" alt="vktrQ" class="vktrq-logo">
            <h2>Место обыска аккаунта</h2>
            <input type="text" id="search-email" class="input-field" placeholder="Введите Email...">
            <input type="password" id="search-password" class="input-field" placeholder="Введите Пароль...">
            <button class="btn-search" onclick="startExtraSearch()">Запустить поиск</button>
        </div>
    </main>
</div>

<div id="vktrq-modal" class="vktr-modal">
    <div class="vktr-modal-content">
        <h3 id="account-found-text">Система vktrQ</h3>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
            <button onclick="forceLoginYes()" class="btn-yes">ДА</button>
            <button onclick="forceLoginNo()" class="btn-no">НЕТ</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, memoryLocalCache, setLogLevel } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, setPersistence, inMemoryPersistence, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAVeL6QJH-Qheb8EISSy-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    };

    const app = initializeApp(firebaseConfig);
    setLogLevel('silent');
    const db = initializeFirestore(app, { localCache: memoryLocalCache() });
    const auth = getAuth(app);
    setPersistence(auth, inMemoryPersistence);

    let tempFoundUser = null;

    window.startExtraSearch = async function() {
        const email = document.getElementById('search-email').value.trim();
        const password = document.getElementById('search-password').value;

        if (!email || !password) return alert("Заполните все поля!");

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            tempFoundUser = { email: userCredential.user.email, uid: userCredential.user.uid };
            document.getElementById('account-found-text').innerText = `Найден аккаунт: ${email}`;
            document.getElementById('vktrq-modal').style.display = 'flex';
        } catch (error) {
            alert("vktrQ: Аккаунт не найден или ошибка данных.");
        }
    };

    window.forceLoginYes = function() {
        if (tempFoundUser) {
            sessionStorage.setItem('vktr_auth_bypass', "true");
            sessionStorage.setItem('vktr_email', tempFoundUser.email);
            window.location.href = "index.html";
        }
    };

    window.forceLoginNo = function() {
        document.getElementById('vktrq-modal').style.display = 'none';
        tempFoundUser = null;
    };
</script>
</body>
</html>
