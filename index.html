<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Портал услуг</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-red: #e60000;
            --card-bg: #161616;
            --box-bg: #181818;
        }

        body { background-color: var(--bg-color); color: white; font-family: tahoma, arial; margin: 0; display: flex; justify-content: center; }
        
        /* ШАПКА */
        header { position: fixed; top: 0; width: 100%; height: 45px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: center; z-index: 2000; }
        .header-content { width: 800px; display: flex; align-items: center; padding-top: 10px; }

        .container { width: 800px; margin-top: 65px; display: flex; gap: 20px; }
        nav { width: 160px; flex-shrink: 0; }
        nav ul { list-style: none; padding: 0; }
        nav a { color: #d1d1d1; text-decoration: none; cursor: pointer; font-size: 13px; }

        main { flex-grow: 1; background: var(--card-bg); border-radius: 4px; border: 1px solid #333; padding: 15px; min-height: 400px; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .vktr-box-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .vktr-box { background: var(--box-bg); width: 400px; border-radius: 8px; border: 1px solid #444; overflow: hidden; }
        .vktr-box-header { padding: 10px; background: #222; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .vktr-box-body { padding: 20px; text-align: center; }

        /* КРОПЕР */
        .crop-area { 
            width: 200px; height: 200px; margin: 0 auto 15px; 
            border: 2px dashed var(--accent-red); position: relative; 
            overflow: hidden; background: #000; cursor: move;
        }
        #crop-preview { position: absolute; top: 0; left: 0; transform-origin: 0 0; }

        /* АВАТАРКА В ПРОФИЛЕ */
        .vktr-avatar-wrapper { 
            position: relative; width: 120px; height: 120px; 
            background: #111; overflow: hidden; cursor: pointer; border: 1px solid #333;
        }
        #main-ava { position: absolute; transform-origin: 0 0; width: 100%; height: auto; display: block; }
        
        /* ПЛАШКА (ИСПРАВЛЕНА) */
        .vktr-upload-btn { 
            position: absolute; bottom: -40px; left: 0; width: 100%; 
            display: block; transition: bottom 0.2s ease-in-out; z-index: 10; 
        }
        .vktr-avatar-wrapper:hover .vktr-upload-btn { bottom: 0; }

        .btn-red { background: var(--accent-red); color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="box-overlay" class="vktr-box-overlay">
        <div class="vktr-box">
            <div class="vktr-box-header"><span>Редактор миниатюры</span><span style="cursor:pointer" onclick="closeBox()">&times;</span></div>
            <div class="vktr-box-body">
                <div class="crop-area" id="crop-zone"><img src="default-avatar.png" id="crop-preview" draggable="false"></div>
                <input type="range" id="zoom-range" min="0.1" max="3" step="0.01" value="1" style="width: 100%; accent-color: red;">
                <input type="file" id="file-selector" style="display: none" accept="image/*">
                <button class="btn-red" style="background:#444" onclick="document.getElementById('file-selector').click()">Выбрать файл</button>
                <button class="btn-red" onclick="saveAvatar()">Сохранить аватарку</button>
            </div>
        </div>
    </div>

    <header><div class="header-content"><img src="WhiteLogoVKTR.png" height="25"></div></header>

    <div class="container">
        <nav><ul><li><a onclick="renderProfile('vktr_user_1')">Моя Страница</a></li></ul></nav>
        <main id="app-content"><h2>Нажми на "Моя Страница"</h2></main>
    </div>

    <script>
        let ava = { src: 'default-avatar.png', zoom: 1, x: 0, y: 0 };
        let isDragging = false, startX, startY;

        const cp = document.getElementById('crop-preview');
        const zr = document.getElementById('zoom-range');

        // Логика перемещения в макете
        document.getElementById('crop-zone').onmousedown = (e) => {
            isDragging = true;
            startX = e.clientX - ava.x;
            startY = e.clientY - ava.y;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            ava.x = e.clientX - startX;
            ava.y = e.clientY - startY;
            cp.style.left = ava.x + 'px';
            cp.style.top = ava.y + 'px';
        };

        window.onmouseup = () => isDragging = false;
        zr.oninput = (e) => { 
            ava.zoom = e.target.value; 
            cp.style.transform = `scale(${ava.zoom})`; 
        };

        document.getElementById('file-selector').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                ava.src = ev.target.result;
                cp.src = ava.src;
                ava.x = 0; ava.y = 0; ava.zoom = 1;
                cp.style.left = '0px'; cp.style.top = '0px';
                cp.style.transform = 'scale(1)';
                zr.value = 1;
            };
            r.readAsDataURL(e.target.files[0]);
        };

        function openBox() { document.getElementById('box-overlay').style.display = 'flex'; }
        function closeBox() { document.getElementById('box-overlay').style.display = 'none'; }
        function saveAvatar() { closeBox(); renderProfile('vktr_user_1'); }

        window.renderProfile = function(id) {
            // Коэффициент 0.6 нужен, чтобы пересчитать координаты из 200px (макет) в 120px (профиль)
            const factor = 120 / 200;
            document.getElementById('app-content').innerHTML = `
                <h3 style="margin-top:0;">Профиль: ${id}</h3>
                <div style="background: #222; padding: 20px; border-radius: 8px; display: inline-block;">
                    <div class="vktr-avatar-wrapper" onclick="openBox()">
                        <img src="${ava.src}" id="main-ava" 
                             style="left: ${ava.x * factor}px; top: ${ava.y * factor}px; width: ${ava.zoom * 100}%;">
                        <img src="setnewavatar.png" class="vktr-upload-btn">
                    </div>
                    <p style="font-size: 11px; text-align: center; color: #888;">vktrID</p>
                </div>
            `;
        };
    </script>
</body>
</html>
