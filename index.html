<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>vktr</title>
    <style>
        /* Твой фирменный фон */
        body {
            background: linear-gradient(to bottom right, #300000, #ff007f); 
            background-attachment: fixed;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Шапка без ИИ-шных наворотов */
        .top-nav {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-bottom: 2px solid #ff007f;
            display: flex;
            align-items: center;
        }

        .top-nav .brand {
            font-size: 24px;
            font-weight: 900;
            text-transform: lowercase;
            margin-right: 40px;
            color: #fff;
            text-decoration: none;
        }

        .top-nav a {
            color: #ccc;
            text-decoration: none;
            margin-right: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        .top-nav a:hover {
            color: #ff007f;
        }

        /* Основной блок */
        .main-block {
            margin: 50px auto;
            width: 90%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 40px;
        }

        .status {
            background: #222;
            color: #00ff00;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: monospace;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #00ff00;
        }

        h2 { font-size: 32px; margin-top: 0; }
        
        /* Кнопки как ты любишь - текстовые */
        .btn-text {
            color: #00e1ff;
            cursor: pointer;
            text-decoration: underline;
            font-weight: bold;
        }

        .btn-text:hover { color: #fff; }

        /* Траурный блок */
        #mourning {
            display: none;
            background: #111;
            padding: 20px;
            border: 2px solid #fff;
            margin-top: 20px;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="index.html" class="brand">vktr</a>

<script>
    // Проверка дат 24.02, 22.03, 11.09
    const d = new Date();
    const day = d.getDate();
    const month = d.getMonth() + 1;
    
    const dates = ["24.2", "22.3", "11.9"];
    if (dates.includes(day + "." + month)) {
        document.getElementById('mourning').style.display = 'block';
        document.body.style.filter = 'grayscale(1)';
    }
</script>
