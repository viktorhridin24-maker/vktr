<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr Portal</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        
        /* Красная шапка из твоего макета */
        header {
            background-color: #e31e24; /* Тот самый красный vktr */
            display: flex;
            align-items: center;
            padding: 10px 20px;
            color: white;
            justify-content: space-between;
        }

        .logo { font-weight: bold; font-size: 24px; cursor: pointer; }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
            cursor: pointer;
        }

        .icons img { width: 30px; height: 30px; margin-left: 15px; cursor: pointer; }

        /* Контентная область */
        #content { padding: 40px; text-align: center; }

        .banner {
            background: white;
            border: 2px solid #e31e24;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-news {
            background: #e31e24;
            color: white;
            padding: 10px 30px;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        /* Анимация загрузки (пока сервер открывается) */
        .loader {
            display: none; /* Скрыта по умолчанию */
            font-size: 20px;
            color: #666;
        }
        
        .loader img { width: 100px; animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showMain()">vktr</div>
    <nav>
        <a onclick="loadSection('forum')">Форум</a>
        <a onclick="loadSection('news')">Новости</a>
        <a onclick="loadSection('downloads')">Скачивания</a>
    </nav>
    <div class="icons">
        <span>✉️</span>
        <span>👤</span>
    </div>
</header>

<div id="content">
    <div id="main-view">
        <div class="banner">
            <h1 style="color: #e31e24;">vktr X Meowl.Social</h1>
            <p>Скачай Vkype и проводи коллаборацию!</p>
            <button class="btn-news" onclick="loadSection('news')">Все новости</button>
        </div>
        <img src="Тодук.png" alt="Тодук" style="width: 150px;">
    </div>

    <div id="loader" class="loader">
        <p>Сервер vktr просыпается...</p>
        <div style="font-size: 50px;">⏳</div>
    </div>

    <div id="dynamic-content"></div>
</div>

<script>
    function loadSection(section) {
        // 1. Прячем главную и показываем загрузку
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('dynamic-content').innerHTML = '';
        document.getElementById('loader').style.display = 'block';

        // 2. Имитируем ожидание ответа сервера (2 секунды)
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            
            let html = '';
            if (section === 'forum') {
                html = '<h2>Форум vktr</h2><p>Здесь скоро будут обсуждения. Родительский контроль активен.</p>';
            } else if (section === 'news') {
                html = '<h2>Официальные новости</h2><p>Сегодня в меню: запуск портала и МакКриспи Хот Хани!</p>';
            } else if (section === 'downloads') {
                html = '<h2>Зона скачивания</h2><p>ActivityBox v1.0 доступен для загрузки.</p>';
            }
            
            document.getElementById('dynamic-content').innerHTML = html;
        }, 2000);
    }

    function showMain() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('dynamic-content').innerHTML = '';
        document.getElementById('loader').style.display = 'none';
    }
</script>

</body>
</html>
