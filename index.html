<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Подключаем капчу сразу -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Портал услуг</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-red: #e60000;
            --card-bg: #161616;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: tahoma, arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* Контейнер аватара */
        .vktr-avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            border: 2px solid #333;
            background: #111;
            overflow: hidden;
            cursor: pointer;
            margin: 0 auto;
        }

        #main-ava {
            width: 100%; /* По умолчанию 100% */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Плашка загрузки (твоё изображение) */
        .vktr-upload-btn {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            height: 40px;
            transition: bottom 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
        }

        .vktr-avatar-wrapper:hover .vktr-upload-btn {
            bottom: 0;
        }

        /* Стили для основного контента */
        header { position: fixed; top: 0; width: 100%; height: 45px; background: #222; border-bottom: 1px solid #444; z-index: 2000; display: flex; justify-content: center; }
        .container { width: 800px; margin-top: 65px; display: flex; gap: 20px; }
        main { flex-grow: 1; background: var(--card-bg); border-radius: 4px; border: 1px solid #333; padding: 15px; min-height: 500px; }
        
        /* Кнопки и инпуты */
        .vktr-input { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; margin-top: 5px; }
        .vktr-btn-red { background: var(--accent-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div style="width: 800px; display: flex; align-items: center;"><img src="WhiteLogoVKTR.png" height="25"></div>
    </header>

    <div class="container">
        <main id="app-content">
            <!-- Тут появится контент -->
        </main>
    </div>

    <!-- Скрытый инпут для выбора файла -->
    <input type="file" id="avatar-input" style="display: none;" accept="image/*">

    <script>
        // Глобальная переменная для ширины (чтобы настраивать)
        let currentAvaWidth = 100;

        window.renderProfile = function(id) {
            document.getElementById('app-content').innerHTML = `
                <h2 style="font-size: 16px;">Профиль: ${id}</h2>
                <div style="background: #222; padding: 20px; border-radius: 8px; display: flex; gap: 20px;">
                    <div style="text-align: center;">
                        
                        <div class="vktr-avatar-wrapper" onclick="document.getElementById('avatar-input').click()">
                            <img src="default-avatar.png" id="main-ava" style="width: ${currentAvaWidth}%;">
                            <div class="vktr-upload-btn">
                                <img src="captcha-icon.png" style="width: 20px; margin-right: 5px;"> <!-- Для теста иконка -->
                                <span style="font-size: 10px;">ЗАГРУЗИТЬ</span>
                            </div>
                        </div>

                    </div>
                    <div style="flex-grow: 1;">
                        <p>Настройки ширины: <b id="width-val">${currentAvaWidth}%</b></p>
                        <input type="range" min="10" max="200" value="${currentAvaWidth}" 
                               oninput="updateAvaWidth(this.value)" style="width: 100%; accent-color: red;">
                        
                        <div style="margin-top: 20px;">
                            <button class="vktr-btn-red" onclick="renderEditProfile()">Настройки vktrID</button>
                        </div>
                    </div>
                </div>
            `;
        };

        // Логика изменения ширины
        window.updateAvaWidth = (val) => {
            currentAvaWidth = val;
            const img = document.getElementById('main-ava');
            if(img) img.style.width = val + '%';
            document.getElementById('width-val').innerText = val + '%';
        };

        // Логика загрузки файла
        document.getElementById('avatar-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('main-ava').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        window.renderEditProfile = function() {
            document.getElementById('app-content').innerHTML = `
                <h2>Настройки vktrID</h2>
                <div style="background: #181818; padding: 20px; border-radius: 8px; border: 1px solid #333;">
                    <label style="color: #888; font-size: 11px;">БЕЗОПАСНОСТЬ:</label>
                    <div style="margin: 15px 0;">
                        <div class="g-recaptcha" data-sitekey="YOUR_KEY" data-theme="dark"></div>
                    </div>
                    <button class="vktr-btn-red" onclick="renderProfile('vktr_user_1')">Сохранить и выйти</button>
                </div>
            `;
            if (window.grecaptcha) grecaptcha.render();
        };

        // Запуск
        renderProfile('vktr_user_1');
    </script>
</body>
</html>
