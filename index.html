<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>VKTR | Портал услуг</title>
    
    <!-- Фавикон бабочки для узнаваемости -->
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* Красно-белый стандарт 2.0 */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-red: #e60000;
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Анимация из видео Record_2026_04_29_20_23_56_611.mp4 */
        .vktr-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #333;
            padding: 25px;
            margin-bottom: 20px;
            max-width: 600px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease-out;
        }

        .vktr-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-buy {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-buy:hover {
            transform: scale(1.05);
        }

        .footer-links {
            margin-top: 50px;
            font-size: 12px;
            color: var(--text-gray);
        }

        .footer-links a { color: var(--accent-red); text-decoration: none; }
    </style>
</head>
<body>

    <!-- Секция Услуг -->
    <div class="vktr-card" id="service-meowl">
        <h2>🐱 Meowl.Social Premium</h2>
        <p>Подписка на премиум-возможности от нашего партнёра Meowl.</p>
        <p>Стоимость: <strong>500 🫧 (пузырьков)</strong></p>
        <button class="btn-buy" onclick="buyService('meowl_premium')">Активировать за пузырьки</button>

    </div>

            authDomain: "vktrserver.firebaseapp.com",
            projectId: "vktrserver",
            storageBucket: "vktrserver.firebasestorage.app",
            messagingSenderId: "305612049380",
            appId: "1:305612049380:web:baa13df62e123adc5195f1",
            measurementId: "G-Y6W7430K9V"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция покупки (пример для Виктора)
        window.buyService = async (serviceId) => {
            console.log("Запрос к базе данных по услуге:", serviceId);
            // Тут логика списания пузырьков
        };

        // Запуск анимаций появления
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        });
        document.querySelectorAll('.vktr-card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
