<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
   </head>
<body>

<input type="file" id="file-input" accept="image/*">

<header>
    <div class="h-content">
        <div class="h-left">
            <div class="logo-wrap">
                <!-- Если картинки нет — показывается текстовый логотип -->
                <img src="WhiteLogoVKTR.png" alt="VKTR" class="logo-img"
                     onclick="goToMyProfile()"
                     onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
                <span id="logo-fallback" class="logo-text" onclick="goToMyProfile()" style="display:none;"><span>VK</span>TR</span>
            </div>
        </div>
        <div class="h-right">
            <button class="h-icon" onclick="goToMyProfile()">👤 Профиль</button>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul id="nav-menu">
            <li id="my-page-nav" class="active" onclick="goToMyProfile()">Моя Страница</li>
            <div class="nav-divider"></div>
            <li style="color:#e04040;" onclick="logout()">Выход</li>
        </ul>
    </nav>
    <main id="content">
        <p style="color:var(--text-muted); font-weight:300; letter-spacing:1px;">Загрузка...</p>
    </main>
</div>

<div id="status-modal" class="vktr-modal">
    <div class="vktr-modal-content">
        <h3>Установить статус</h3>
        <input type="text" id="new-status-text" placeholder="О чём думаешь?" maxlength="50">
        <div class="file-upload-zone" onclick="document.getElementById('music-upload').click()">
            <span id="file-name-label">🎵 Выбрать аудиофайл</span>
            <input type="file" id="music-upload" accept="audio/*">
        </div>
        <button onclick="saveNewStatus()" class="btn-save">Поставить</button>
        <button onclick="closeStatusModal()" class="btn-cancel">Отмена</button>
    </div>
</div>

<!-- Хомяк — замени на свою картинку -->
<img src="hamster.png" class="hamster-helper" alt="helper"
     onerror="this.style.display='none'">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    });
    const auth = getAuth(app);

    const MY_ID = "00001488";
    const IS_MAINTENANCE = false;

    window.generateUserID = (email) => {
        if (email === 'viktorhridin24@gmail.com') return MY_ID;
        let id;
        do { id = Math.floor(10000000 + Math.random() * 90000000).toString(); }
        while (id.includes("67"));
        return id;
    };

    window.logout = () => {
        localStorage.removeItem('vktr_auth_bypass');
        localStorage.removeItem('vktr_user_id');
        localStorage.removeItem('vktr_name');
        location.href = 'login.html';
    };

    window.goToMyProfile = () => {
        const url = new URL(window.location.href);
        if (url.searchParams.has('id')) {
            window.history.pushState({}, '', url.pathname);
        }
        window.showProfile();
    };

    window.showProfile = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrlID = urlParams.get('id');
        const myUserID = localStorage.getItem('vktr_user_id');
        const isMyOwnProfile = !targetUrlID || targetUrlID === myUserID;

        let name, isAdmin, userID, avatar, statusText;

        if (isMyOwnProfile) {
            const email = window.currentUserEmail || "";
            const isBot = (email === 'vitungg15@gmail.com');
            isAdmin = (email === 'viktorhridin24@gmail.com' || isBot);
            name = isBot ? "SYSTEM" : (localStorage.getItem('vktr_name') || email.split('@')[0]);
            avatar = localStorage.getItem('vktr_avatar') || null;
            userID = myUserID || '...';
            statusText = localStorage.getItem('vktr_status_text') || 'В сети';
            document.getElementById('my-page-nav')?.classList.add('active');
        } else {
            userID = targetUrlID;
            name = userID === MY_ID ? "Viktor" : "Пользователь #" + userID.substring(0, 4);
            isAdmin = userID === MY_ID;
            avatar = null;
            statusText = 'В сети (просмотр)';
            document.getElementById('my-page-nav')?.classList.remove('active');
        }

        const avatarHTML = avatar
            ? `<img src="${avatar}" id="main-ava" onerror="this.parentElement.innerHTML='<div class=\\'avatar-placeholder\\'>👤</div>'">`
            : `<div class="avatar-placeholder">👤</div>`;

        document.getElementById('content').innerHTML = `
            <div class="profile-row">
                <div class="vktr-avatar-wrapper ${isMyOwnProfile ? 'editable' : ''}"
                     ${isMyOwnProfile ? "onclick=\"document.getElementById('file-input').click()\"" : ''}>
                    ${avatarHTML}
                    ${isMyOwnProfile ? `<div class="upload-overlay">📷 Сменить фото</div>` : ''}
                </div>
                <div class="profile-info">
                    <div class="profile-name-row">
                        <span class="profile-name">${name}</span>
                        ${isAdmin ? '<span class="admin-badge">✦ Admin</span>' : ''}
                    </div>
                    <p class="profile-id">ID: ${userID}</p>
                    <div class="status-bubble ${isMyOwnProfile ? 'editable' : ''}"
                         ${isMyOwnProfile ? "onclick=\"document.getElementById('status-modal').style.display='flex'\"" : ''}>
                        <span class="status-dot" style="${!isMyOwnProfile ? 'background:#39ff14;' : ''}"></span>
                        ${statusText}
                    </div>
                </div>
            </div>
            <div class="profile-divider"></div>
            <p class="empty-state">
                ${isMyOwnProfile ? 'Активность и публикации появятся здесь.' : 'У этого пользователя пока нет публикаций.'}
            </p>
        `;
    };

    window.closeStatusModal = () => {
        document.getElementById('status-modal').style.display = 'none';
    };

    window.saveNewStatus = () => {
        const input = document.getElementById('new-status-text');
        if (input?.value) localStorage.setItem('vktr_status_text', input.value);
        const fileInput = document.getElementById('music-upload');
        const file = fileInput?.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { localStorage.setItem('vktr_status_music', e.target.result); window.showProfile(); };
            reader.readAsDataURL(file);
        } else {
            window.showProfile();
        }
        document.getElementById('status-modal').style.display = 'none';
    };

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => { localStorage.setItem('vktr_avatar', ev.target.result); window.showProfile(); };
        reader.readAsDataURL(file);
    };

    document.getElementById('music-upload').onchange = (e) => {
        const name = e.target.files[0]?.name || '';
        if (name) document.getElementById('file-name-label').textContent = '🎵 ' + name;
    };

    onAuthStateChanged(auth, (user) => {
        // ✅ Автоматический обход аутентификации для тестирования
        const isBypass = localStorage.getItem('vktr_auth_bypass') === "true" || !user;
        
        if (user || isBypass) {
            window.currentUserEmail = user ? user.email : 'test@example.com';
            let userID = localStorage.getItem('vktr_user_id') || window.generateUserID(window.currentUserEmail);
            localStorage.setItem('vktr_user_id', userID);
            localStorage.setItem('vktr_auth_bypass', 'true');
            if (IS_MAINTENANCE && userID !== MY_ID) { location.href = 'maintenance.html'; return; }
            window.showProfile();
        } else {
            location.href = "login.html";
        }
    });

    window.addEventListener('popstate', () => window.showProfile());
</script>

</body>
</html>
