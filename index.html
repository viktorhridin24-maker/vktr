<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VKTR | Portal</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; --header-bg: #222; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        /* Та самая плашка из хедера */
        header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 48px; 
            background: var(--header-bg); 
            border-bottom: 1px solid #444; 
            display: flex; 
            justify-content: center; 
            z-index: 1000; 
        }
        .h-content { 
            width: 1000px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px;
        }

        .h-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 30px; cursor: pointer; } /* Сюда вставишь свой логотип */
        
        .services-nav { display: flex; gap: 15px; font-size: 13px; }
        .services-nav a { color: #aaa; text-decoration: none; transition: 0.2s; }
        .services-nav a:hover { color: #fff; }

        .h-right { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #888; }

        .container { width: 1000px; margin-top: 65px; display: flex; gap: 20px; }
        nav { width: 180px; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { padding: 7px 10px; color: #d1d1d1; cursor: pointer; font-size: 13px; border-radius: 4px; }
        nav li:hover { background: #222; color: #fff; }

        main { flex-grow: 1; background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 4px; min-height: 400px; }

        .vktr-avatar-wrapper { position: relative; width: 120px; height: 120px; background: #222; overflow: hidden; border: 1px solid #444; cursor: pointer; margin-top: 15px; }
        #main-ava { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        /* Хомяк-помощник из image_7434df.png */
        .hamster-helper { position: fixed; right: 20px; bottom: 20px; width: 90px; }
    </style>
</head>
<body>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-email').innerText = user.email;
        } else {
            window.location.href = "Login.html";
        }
    });
</script>

<header>
    <div class="h-content">
        <div class="h-left">
            <!-- Замени logo.png на путь к твоему файлу логотипа -->
            <img src="logo_vktr.png" alt="VKTR" class="logo-img" onclick="location.href='index.html'">
            <div class="services-nav">
                <a href="#">Мой портал услуг</a>
                <a href="#">Особистий кабінет</a>
                <a href="#">ЮтААААА6</a>
                <a href="#">ИИ</a>
            </div>
        </div>
        <div class="h-right">
            <span id="user-email">Загрузка...</span>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul>
            <li onclick="showProfile()">Моя Страница</li>
            <li>Новости</li>
            <li>Мессенджер</li>
            <li>Друзья</li>
            <li style="margin-top:20px; color:#666" onclick="location.href='Login.html'">Выход</li>
        </ul>
    </nav>
    <main id="content">
        <h3>Загрузка системы...</h3>
    </main>
</div>

<img src="hamster.png" class="hamster-helper" alt="helper">

<script>
    function showProfile() {
        document.getElementById('content').innerHTML = `
            <h2 style="margin-top:0">Профиль</h2>
            <div class="vktr-avatar-wrapper">
                <img src="https://via.placeholder.com/120" id="main-ava">
            </div>
            <p style="color:#888; font-size:13px">Нажми на фото, чтобы изменить аватар</p>
            <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
            <div class="user-status">Статус: В сети (VKTR System)</div>
        `;
    }

    window.onload = () => {
        setTimeout(showProfile, 400);
    };
</script>

</body>
</html>
