<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr - Профессиональный Сервис</title>
    <style>
        body {
            background-color: #d9e1a9; /* Тот самый светлый фон как у Чомика */
            background-image: linear-gradient(#c5d185 1px, transparent 1px);
            background-size: 100% 40px; /* Полоски как в 2010-х */
            margin: 0;
            font-family: 'Tahoma', sans-serif;
        }

        /* 1. HEADER (Верхняя панель) */
        header {
            background: #4a6d1a; /* Тёмно-зеленый градиент как в оригинале */
            background: linear-gradient(to bottom, #729633, #4a6d1a);
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-size: 12px;
            border-bottom: 2px solid #3d5a15;
        }

        .user-panel span { margin-right: 15px; cursor: pointer; }
        .user-panel span:hover { text-decoration: underline; }

        /* 2. ПОДПИСКИ В ПУЗЫРЯХ (в Header) */
        .subs-dropdown {
            position: relative;
            display: inline-block;
        }
        .subs-trigger { font-weight: bold; color: #ffeb3b; cursor: pointer; }

        /* 3. ОСНОВНОЙ БЛОК (Сайт как на картинке) */
        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            min-height: 80vh;
        }

        .hero-banner {
            background: #9ab92d; /* Зеленый фон баннера */
            padding: 40px;
            text-align: left;
            border-bottom: 5px solid #ffeb3b;
            color: white;
        }

        /* 4. ТВОИ КНОПКИ-ФАРЫ (Интеграция стиля) */
        .nav-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #700000;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff4d4d 0%, #b30000 100%);
            box-shadow: inset 0px 1px 0px rgba(255,255,255,0.3), 0px 2px 4px rgba(0,0,0,0.3);
            margin: 5px;
            transition: 0.2s;
        }

        .nav-btn:hover {
            box-shadow: 0px 0px 15px #ff0000; /* Эффект фар */
        }

        .content-area { padding: 20px; display: grid; grid-template-columns: 200px 1fr; gap: 20px; }
        
        .sidebar { border-right: 1px dashed #ccc; padding-right: 10px; }
        .sidebar h3 { font-size: 14px; color: #4a6d1a; }
        
        /* vktrDream в золоте */
        .dream { border: 2px solid #ffd700 !important; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    </style>
</head>
<body>

    <header>
        <div class="user-panel">
            <span>👤 <b>viktorhridin24</b></span>
            <span>✉️ Сообщения</span>
            <span>💰 <b id="balance">1000 Пузырей</b></span>
        </div>
        <div class="subs-dropdown">
            <span class="subs-trigger" onclick="toggleSubs()">⭐ Все подписки ▼</span>
        </div>
        <div>⚙️ Параметры</div>
    </header>

    <div class="container">
        <div class="hero-banner">
            <h1 style="margin:0; font-size: 40px;">vktr Service</h1>
            <p>Ваши данные сохранены. Добро пожаловать в систему.</p>
        </div>

        <div class="content-area">
            <div class="sidebar">
                <h3>РАЗДЕЛЫ</h3>
                <button class="nav-btn" onclick="openForum()">ФОРУМ</button>
                <button class="nav-btn">vktrBook</button>
                <button class="nav-btn">Explorer</button>
            </div>
            
            <div class="main-content">
                <h3>Последние обновления</h3>
                <div id="news-feed">
                    <p>• Добавлена система регистрации в стиле 2010.</p>
                    <p>• Подписки перенесены в пузыри (Header).</p>
                </div>
                <hr>
                <button class="nav-btn dream">АКТИВИРОВАТЬ vktrDream</button>
            </div>
        </div>
    </div>

    <script>
        function openForum() {
            // Переход на новую вкладку vktr
            window.open('forum.html', '_self'); 
        }

        function toggleSubs() {
            alert("Список подписок: \n1. vktrMini\n2. vktrDream (Gold)\n3. vktrPro");
        }
        
        // База данных (имитация сохранения сессии)
        localStorage.setItem('user', 'viktorhridin24');
    </script>
</body>
</html>
