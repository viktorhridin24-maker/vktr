<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vktrserver | Holiday Edition</title>
    <style>
        /* ПОТУЖНЫЙ ДИЗАЙН 2026 */
        body {
            background-color: #0d0d0d; /* Глубокий черный как твоя башня */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .status-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #00ff41; /* Цвет хакера/сервера */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .disk-info {
            margin: 20px 0;
            font-size: 14px;
        }

        .progress-bar {
            background: #333;
            height: 10px;
            border-radius: 5px;
            margin-top: 5px;
        }

        .progress-fill {
            background: #ff4141; /* Красный как твой Диск C */
            width: 95%; /* Почти полный! */
            height: 100%;
            border-radius: 5px;
        }

        .holiday-badge {
            background: #ff9900;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .hamster-status {
            font-style: italic;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="holiday-badge">РЕЖИМ: 1 МАЯ / КАНИКУЛЫ</div>

    <div class="status-card">
        <h1>vktrserver</h1>
        <p>Состояние: <strong>ПОТУЖНО</strong></p>
        
        <div class="disk-info">
            Локальный диск (C:) - 655 МБ свободно
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="hamster-status">
            🐹 Хомяк: "Дизайн обновлен, Jackbox съеден!"
        </div>
    </div>

    <script type="module">
        console.log("Дизайн через DOCTYPE обновлен успешно!");
        // Сюда можно вставить код из прошлого шага
    </script>
</body>
</html>
