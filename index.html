<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr Service</title>
    <style>
        body {
            background-color: #0a0a0a; /* Почти черный */
            color: #ffffff;
            font-family: 'Tahoma', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Экран регистрации */
        #auth-screen {
            background: #ffffff; /* Белый блок в стиле Чомика */
            color: #000;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 300px;
            transition: 0.5s;
        }

        #auth-screen h2 { margin-bottom: 20px; letter-spacing: 2px; }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Твоя кнопка регистрации (в стиле Чомик-лайт) */
        .login-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        /* ОСНОВНОЙ САЙТ (Скрыт по умолчанию) */
        #main-site {
            display: none;
            width: 90%;
            max-width: 900px;
            text-align: center;
            animation: fadeIn 0.8s;
        }

        .desktop {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px;
            border-radius: 20px;
        }

        /* ТВОИ КНОПКИ-ФАРЫ (из твоего CSS) */
        .nav-btn {
            padding: 15px 30px;
            margin: 15px;
            border-radius: 8px;
            border: 1px solid #700000;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff4d4d 0%, #b30000 100%);
            box-shadow: 0px 2px 4px rgba(0,0,0,0.3);
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            box-shadow: 0px 0px 20px #ff0000; /* Фары светят */
            transform: scale(1.05);
        }

        .dream { border: 2px solid #ffd700 !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2>VKTR LOGIN</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" placeholder="Пароль">
        <button class="login-btn" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="main-site">
        <div class="desktop">
            <h1 style="color: #fff; letter-spacing: 5px;">ДОБРО ПОЖАЛОВАТЬ, <span id="user-name">USER</span></h1>
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 30px 0;">
            
            <div class="grid">
                <button class="nav-btn" onclick="alert('Новости vktr загружены')">НОВОСТИ</button>
                <button class="nav-btn" onclick="alert('vktrBook активен')">vktrBook</button>
                <button class="nav-btn" onclick="alert('Форум в разработке')">ФОРУМ</button>
                <br>
                <button class="nav-btn" onclick="alert('Explorer запущен')">vktrExplorer</button>
                <button class="nav-btn dream" onclick="alert('Элитный доступ vktrDream!')">vktrDream</button>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            if (user.length < 2) {
                alert("Введите логин!");
                return;
            }
            
            // Прячем вход, показываем сайт
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('user-name').innerText = user.toUpperCase();
            
            console.log("Авторизация успешна: " + user);
        }
    </script>
</body>
</html>
