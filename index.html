<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vktrserver | Official</title>
    <style>
        body {
            background-color: #000; /* Твой фирменный черный фон */
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .promo-video {
            width: 100%;
            max-width: 640px;
            border: 2px solid #333;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }

        /* Кнопки с эффектом нажатия */
        .vktr-btn {
            background: #111;
            color: white;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background 0.2s;
        }

        .vktr-btn:active {
            transform: scale(0.95); /* Эффект прожатия */
            background: #222;
        }

        .wiki-btn {
            border-color: #ff4141; /* Выделяем В-кипедию под цвет Топота */
        }

        .icon-bar {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .icon-bar img {
            width: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-bar img:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <video class="promo-video" controls>
        <source src="promo.mp4" type="video/mp4">
    </video>

    <div class="button-container">
        <button class="vktr-btn" onclick="playSound('Системное уведомление.wav')">Что это за сервис?</button>
        <button class="vktr-btn" onclick="playSound('Обычное уведомление.wav')">Зачем?</button>
        <button class="vktr-btn wiki-btn" onclick="playSound('Заход на сайт.wav')">В-кипедия</button>
    </div>

    <div class="icon-bar">
        <img src="Success.png" alt="Success" onclick="playSound('Обычное уведомление.wav')">
        
        <img src="B.nottext.png" alt="Login" onclick="playSound('Системное уведомление.wav')">
        
        <img src="vktrServerFailure.png" alt="Failure" onclick="playSound('Ошибка.wav')">
        
        <img src="Топот.png" alt="Топот" onclick="playSound('Топот.wav')">
    </div>

    <script>
        function playSound(file) {
            const audio = new Audio(file);
            audio.play().catch(error => console.log("Кликни на страницу, чтобы включить звук!"));
        }
    </script>

</body>
</html>
