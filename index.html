<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vktr | Главная</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ */
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрирование по горизонтали */
            justify-content: center; /* Центрирование по вертикали */
            min-height: 100vh;
        }

        /* КОНТЕЙНЕР ДЛЯ ВИДЕО */
        .video-container {
            background: #111;
            width: 100%;
            max-width: 640px; /* Фиксированная ширина плеера */
            height: 360px;
            border-radius: 10px;
            border: 2px solid #333;
            margin-bottom: 30px; /* Отступ до кнопок */
            box-shadow: 0 0 20px rgba(255, 65, 65, 0.1);
        }

        /* КНОПОЧНЫЙ БЛОК (MENU) */
        .menu-container {
            display: flex;
            flex-direction: column; /* Кнопки в столбик */
            gap: 15px; /* Расстояние между кнопками */
            width: 100%;
            max-width: 300px;
        }

        /* СТИЛИ КНОПОК */
        .vktr-button {
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            text-align: center;
        }

        /* ЭФФЕКТЫ ПРИ НАВЕДЕНИИ */
        .vktr-button:hover {
            background-color: #222;
            border-color: #ff4141; /* Подсветка vktr-красным */
            transform: translateY(-2px);
        }

        /* КНОПКА В-КИПЕДИЯ (АКТИВНАЯ НА ВИДЕО) */
        .vktr-button.active {
            border-color: #ff4141;
            box-shadow: 0 0 10px rgba(255, 65, 65, 0.3);
        }

    </style>
</head>
<body>

    <div class="video-container">
        <div style="color: #444; padding: 150px 0;">[Видео-плеер]</div>
    </div>

    <div class="menu-container">
        <button class="vktr-button" onclick="playSound1()">Что это за сервис?</button>
        <button class="vktr-button" onclick="playSound2()">Зачем?</button>
        <button class="vktr-button active" onclick="playSound3()">В-кипедия</button>
    </div>

    <script>
        // Скрипты для звуков (заглушки)
        function playSound1() { console.log("Звук 1: Сервис"); }
        function playSound2() { console.log("Звук 2: Зачем"); }
        // playSound3() должна издавать тот самый звук "Балда" или vktr music
        function playSound3() { console.log("Звук 3: В-кипедия"); }
    </script>

</body>
</html>
