<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Portal</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; --header-bg: #222; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        header { position: fixed; top: 0; width: 100%; height: 48px; background: var(--header-bg); border-bottom: 1px solid #444; display: flex; justify-content: center; z-index: 1000; }
        .h-content { width: 1000px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .h-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 30px; cursor: pointer; }
        .h-right { display: flex; align-items: center; gap: 20px; }
        .h-icon { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 14px; color: #fff; text-decoration: none; }
        .h-icon:hover { opacity: 1; }

        .container { width: 1000px; margin-top: 65px; display: flex; gap: 20px; }
        nav { width: 180px; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { padding: 7px 10px; color: #d1d1d1; cursor: pointer; font-size: 13px; border-radius: 4px; }
        nav li:hover { background: #222; color: #fff; }

        main { flex-grow: 1; background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 4px; min-height: 400px; }
        .vktr-avatar-wrapper { position: relative; width: 150px; height: 150px; background: #222; overflow: hidden; border: 1px solid #444; cursor: pointer; }
        #main-ava { width: 100%; height: 100%; object-fit: cover; }
        .upload-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .vktr-avatar-wrapper:hover .upload-overlay { opacity: 1; }
        .status-bubble { display: inline-block; background: #2a2a2a; padding: 8px 15px; border-radius: 15px; font-size: 13px; border: 1px solid #444; margin-top: 10px; cursor: pointer; }
        
        .vktr-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .vktr-modal-content { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #444; width: 340px; text-align: center; }
        .vktr-modal-content input[type="text"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; margin: 15px 0; box-sizing: border-box; }
        .file-upload-zone { padding: 20px; border: 2px dashed #444; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #333; color: #ccc; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-left: 10px; }
        .hamster-helper { position: fixed; right: 20px; bottom: 20px; width: 90px; }
        #file-input, #music-upload { display: none; }
    </style>
</head>
<body>

<input type="file" id="file-input" accept="image/*">
<header>
    <div class="h-content">
        <div class="h-left">
            <img src="WhiteLogoVKTR.png" alt="VKTR" class="logo-img" onclick="location.href='feed.html'">
        </div>
        <div class="h-right">
            <div class="h-icon" onclick="showProfile()">👤 Профиль</div>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul id="nav-menu">
            <li onclick="showProfile()">Моя Страница</li>
            <li style="margin-top:20px; color:#666" onclick="localStorage.removeItem('vktr_auth_bypass'); location.href='login.html'">Выход</li>
        </ul>
    </nav>
    <main id="content"><h3>Загрузка...</h3></main>
</div>

<div id="status-modal" class="vktr-modal">
    <div class="vktr-modal-content">
        <h3>Установить статус</h3>
        <input type="text" id="new-status-text" placeholder="О чем думаешь?" maxlength="50">
        <div class="file-upload-zone" onclick="document.getElementById('music-upload').click()">
            <span id="file-name-label">🎵 Выбрать аудиофайл</span>
            <input type="file" id="music-upload" accept="audio/*">
        </div>
        <button onclick="saveNewStatus()" class="btn-save">Поставить</button>
        <button onclick="closeStatusModal()" class="btn-cancel">Отмена</button>
    </div>
</div>

<img src="hamster.png" class="hamster-helper" alt="helper">

<script type="module">
    // --- ИМПОРТЫ FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    });
    const auth = getAuth(app);

    // --- ФУНКЦИЯ ГЕНЕРАЦИИ ID ---
    window.generateUserID = (email) => {
        if (email === 'viktorhridin24@gmail.com') return "00001488";
        let newID;
        do { 
            newID = Math.floor(10000000 + Math.random() * 90000000).toString(); 
        } while (newID.includes("67"));
        return newID;
    };

    // --- ПРОВЕРКА НА ТЕХНИЧЕСКИЙ ПЕРЕРЫВ ---
    const MY_ID = "00001488";
    const IS_MAINTENANCE = true; // Смени на false, когда захочешь всех пустить обратно
    const currentUserID = localStorage.getItem('vktr_user_id');

    if (IS_MAINTENANCE && currentUserID !== MY_ID) {
        window.location.href = 'maintenance.html';
    }

    // --- СЛУШАТЕЛЬ АВТОРИЗАЦИИ ---
    onAuthStateChanged(auth, (user) => {
        const isBypass = localStorage.getItem('vktr_auth_bypass') === "true";
        if (user || isBypass) {
            window.currentUserEmail = user ? user.email : 'viktorhridin24@gmail.com';
            
            // Заранее генерируем ID и сохраняем, чтобы проверка выше работала при обновлении
            let userID = localStorage.getItem('vktr_user_id') || window.generateUserID(window.currentUserEmail);
            localStorage.setItem('vktr_user_id', userID);

            // Повторная проверка сразу после получения ID (на случай первого входа)
            if (IS_MAINTENANCE && userID !== MY_ID) {
                window.location.href = 'maintenance.html';
                return;
            }

            window.showProfile(); 
        } else { 
            window.location.href = "login.html"; 
        }
    });

    // --- ОСТАЛЬНЫЕ ФУНКЦИИ ИНТЕРФЕЙСА ---
    window.showProfile = () => {
        const email = window.currentUserEmail || "";
        const isBot = (email === 'vitungg15@gmail.com');
        const isAdmin = (email === 'viktorhridin24@gmail.com' || isBot);
        const name = isBot ? "SYSTEM" : (localStorage.getItem('vktr_name') || email.split('@')[0]);
        const avatar = localStorage.getItem('vktr_avatar') || 'default-avatar_2.png';
        const userID = localStorage.getItem('vktr_user_id');

        document.getElementById('content').innerHTML = `
            <div style="display:flex; gap:25px;">
                <div class="vktr-avatar-wrapper" onclick="document.getElementById('file-input').click()">
                    <img src="${avatar}" id="main-ava">
                    <div class="upload-overlay"><img src="setnewavatar_2.png" style="width:30px;"></div>
                </div>
                <div>
                    <h2>${name} ${isAdmin ? '✅' : ''}</h2>
                    <p>ID: ${userID}</p>
                    <div class="status-bubble" onclick="document.getElementById('status-modal').style.display='flex'">
                        ${localStorage.getItem('vktr_status_text') || 'всё нормально'}
                    </div>
                </div>
            </div>`;
    };

    window.closeStatusModal = () => {
        document.getElementById('status-modal').style.display = 'none';
    };

    window.saveNewStatus = () => {
        localStorage.setItem('vktr_status_text', document.getElementById('new-status-text').value);
        const file = document.getElementById('music-upload').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { localStorage.setItem('vktr_status_music', e.target.result); window.showProfile(); };
            reader.readAsDataURL(file);
        } else { window.showProfile(); }
        document.getElementById('status-modal').style.display = 'none';
    };

    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = ev => { localStorage.setItem('vktr_avatar', ev.target.result); window.showProfile(); };
        reader.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
