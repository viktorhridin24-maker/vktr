<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VKTR | Portal</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; --header-bg: #222; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        /* Обновленный Хедер */
        header { 
            position: fixed; top: 0; width: 100%; height: 48px; 
            background: var(--header-bg); border-bottom: 1px solid #444; 
            display: flex; justify-content: center; z-index: 1000; 
        }
        .h-content { width: 1000px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .h-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 30px; cursor: pointer; }
        
        /* Правая часть хедера: Сообщение и Профиль */
        .h-right { display: flex; align-items: center; gap: 20px; }
        .h-icon { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 14px; color: #fff; text-decoration: none; }
        .h-icon:hover { opacity: 1; }

        .container { width: 1000px; margin-top: 65px; display: flex; gap: 20px; }
        nav { width: 180px; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { padding: 7px 10px; color: #d1d1d1; cursor: pointer; font-size: 13px; border-radius: 4px; }
        nav li:hover { background: #222; color: #fff; }

        main { flex-grow: 1; background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 4px; min-height: 400px; }

        /* Аватарка с одной плашкой */
        .vktr-avatar-wrapper { 
            position: relative; width: 150px; height: 150px; 
            background: #222; overflow: hidden; border: 1px solid #444; 
            cursor: pointer; border-radius: 4px;
        }
        #main-ava { width: 100%; height: 100%; object-fit: cover; }
        
        .upload-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; 
            justify-content: center; opacity: 0; transition: 0.3s;
        }
        .vktr-avatar-wrapper:hover .upload-overlay { opacity: 1; }
        .upload-overlay img { width: 100%; height: auto; }

        .status-bubble { 
            display: inline-block; background: #2a2a2a; padding: 8px 15px; 
            border-radius: 15px; font-size: 13px; border: 1px solid #444; margin-top: 10px;
        }

        .hamster-helper { position: fixed; right: 20px; bottom: 20px; width: 90px; }
        #file-input { display: none; }
    </style>
</head>
<body>

<input type="file" id="file-input" accept="image/*">

<header>
    <div class="h-content">
        <div class="h-left">
            <img src="logo_vktr.png" alt="VKTR" class="logo-img" onclick="location.href='index.html'">
            <div class="services-nav" style="display: flex; gap: 15px; font-size: 13px;">
                <a href="#" style="color: #aaa; text-decoration: none;">Поиск</a>
                <a href="#" style="color: #aaa; text-decoration: none;">Блог</a>
            </div>
        </div>
        <!-- Вместо почты теперь иконки -->
        <div class="h-right">
            <div class="h-icon" title="Сообщения">✉️ Сообщения</div>
            <div class="h-icon" onclick="showProfile()" title="Мой профиль">👤 Профиль</div>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul id="nav-menu">
            <li onclick="showProfile()">Моя Страница</li>
            <li>Новости</li>
            <li>Мессенджер</li>
            <li style="margin-top:20px; color:#666" onclick="location.href='login.html'">Выход</li>
            <li onclick="showSettings()">Настройки</li>
        </ul>
    </nav>
    <main id="content">
        <h3>Загрузка страницы</h3>
    </main>
</div>

<img src="hamster.png" class="hamster-helper" alt="helper">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.currentUserEmail = user.email;
            showProfile(); 
        } else {
            window.location.href = "Login.html";
        }
    });

    // Делаем функцию доступной глобально
    window.showProfile = function() {
        const email = window.currentUserEmail || "";
        const isBot = (email === 'vitungg15@gmail.com');
        const isAdmin = (email === 'viktorhridin24@gmail.com' || isBot);

       const name = isBot ? "SYSTEM" : (localStorage.getItem('vktr_name') || email.split('@')[0]);
        // Для бота ставим его аватарку, для остальных default-avatar_2.png
        const avatar = isBot ? 'avatar-system .png' : (localStorage.getItem('vktr_avatar') || 'default-avatar_2.png');
       const verifyBadge = isAdmin ? `<img src="vktr_verif.png" style="width:16px; height:16px; vertical-align:middle; margin-left:5px;" title="Подтвержденный аккаунт VKTR">` : '';

        // Только одна плашка выбора файла
        const overlay = isBot ? '' : `
            <div class="upload-overlay" onclick="document.getElementById('file-input').click()">
                <img src="setnewavatar_2.png">
            </div>
        `;

        document.getElementById('content').innerHTML = `
            <div style="display:flex; gap:25px">
                <div class="vktr-avatar-wrapper">
                    <img src="${avatar}" id="main-ava" onerror="this.src='default-avatar_2.png'">
                    ${overlay}
                </div>
                <div>
                    <h2 style="margin:0">${name}${verifyBadge}</h2>
                    <div class="status-bubble" id="user-status" onclick="editStatus()" style="cursor:pointer;">
    💬 ${localStorage.getItem('vktr_status_text') || (isBot ? 'Система запущена' : 'В сети')}
</div>
<div id="music-player-zone">
    ${localStorage.getItem('vktr_status_music') ? `<audio controls src="${localStorage.getItem('vktr_status_music')}" style="height:30px; margin-top:5px;"></audio>` : ''}
</div>
                </div>
            </div>
        `;

        if (isAdmin && !document.getElementById('admin-btn')) {
            const li = document.createElement('li');
            li.id = 'admin-btn';
            li.style.color = 'red';
            li.innerHTML = '⚙️ АДМИН-ПАНЕЛЬ';
            document.getElementById('nav-menu').appendChild(li);
        }
    }
</script>

<script>
    // Обработка загрузки файла
    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                localStorage.setItem('vktr_avatar', event.target.result);
                showProfile();
            };
            reader.readAsDataURL(file);
        }
    };
    function showSettings() {
    const savedName = localStorage.getItem('vktr_name') || (window.currentUserEmail.split('@')[0]);
    const savedPronouns = localStorage.getItem('vktr_pronouns') || "не указано";
    const savedTimezone = localStorage.getItem('vktr_timezone') || "UTC+3 (Москва/Киев)";

    document.getElementById('content').innerHTML = `
        <h2 style="margin-top:0">Настройки профиля</h2>
        <div style="display:flex; flex-direction:column; gap:15px; max-width:400px;">
            
            <label>Имя профиля:
                <input type="text" id="set-name" value="${savedName}" style="width:100%; padding:5px; background:#222; border:1px solid #444; color:white;">
            </label>

            <label>Местоимение:
                <select id="set-pronouns" style="width:100%; padding:5px; background:#222; border:1px solid #444; color:white;">
                    <option value="он/его" ${savedPronouns === 'он/его' ? 'selected' : ''}>он/его</option>
                    <option value="она/её" ${savedPronouns === 'она/её' ? 'selected' : ''}>она/её</option>
                    <option value="они/их" ${savedPronouns === 'они/их' ? 'selected' : ''}>они/их</option>
                </select>
            </label>

            <label>Часовой пояс:
                <input type="text" id="set-tz" value="${savedTimezone}" style="width:100%; padding:5px; background:#222; border:1px solid #444; color:white;">
            </label>

            <label>Дизайн сайта:
                <select id="set-theme" style="width:100%; padding:5px; background:#222; border:1px solid #444; color:white;">
                    <option value="dark">VKTR Dark (Стандарт)</option>
                    <option value="amoled">Deep Black (AMOLED)</option>
                    <option value="red">System Red</option>
                </select>
            </label>

            <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
            
            <button onclick="alert('Функция Firebase смены пароля в разработке')" style="padding:8px; background:#333; border:1px solid #555; color:white; cursor:pointer;">
                Изменить пароль
            </button>

            <button onclick="saveSettings()" style="padding:10px; background:var(--accent); border:none; color:white; cursor:pointer; font-weight:bold; margin-top:10px;">
                СОХРАНИТЬ ИЗМЕНЕНИЯ
            </button>
        </div>
    `;
}

function saveSettings() {
    const newName = document.getElementById('set-name').value;
    const newPronouns = document.getElementById('set-pronouns').value;
    const newTZ = document.getElementById('set-tz').value;
    const newTheme = document.getElementById('set-theme').value;

    localStorage.setItem('vktr_name', newName);
    localStorage.setItem('vktr_pronouns', newPronouns);
    localStorage.setItem('vktr_timezone', newTZ);
    localStorage.setItem('vktr_theme', newTheme);

    // Применяем тему мгновенно
    if(newTheme === 'amoled') document.documentElement.style.setProperty('--bg', '#000');
    else if(newTheme === 'red') document.documentElement.style.setProperty('--accent', '#ff4d4d');
    else document.documentElement.style.setProperty('--bg', '#0a0a0a');

    alert("Настройки сохранены, Виктор!");
    showProfile(); // Возвращаемся в профиль
}
    function editStatus() {
    const newText = prompt("О чем думаешь, Виктор?", localStorage.getItem('vktr_status_text') || "");
    if (newText !== null) {
        localStorage.setItem('vktr_status_text', newText);
        
        // Спрашиваем, хочет ли он добавить музыку (ссылку или файл)
        if(confirm("Хочешь прикрепить музыку к статусу?")) {
            const musicInput = document.createElement('input');
            musicInput.type = 'file';
            musicInput.accept = 'audio/*';
            musicInput.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    localStorage.setItem('vktr_status_music', event.target.result);
                    showProfile(); // Обновляем профиль
                };
                reader.readAsDataURL(file);
            };
            musicInput.click();
        } else {
            showProfile();
        }
    }
}
</script>

</body>
</html>
