<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Portal</title>
    <style>
        :root { 
            --bg: #000000; 
            --surface: #121212; 
            --surface-variant: #1e1e1e;
            --text-main: #ffffff;
            --text-secondary: #9aa0a6;
            --border-color: #2c2c2c;
            /* Градиент от красного к розовому по гайдлайнам Material You */
            --gradient-accent: linear-gradient(135deg, #ff1744 0%, #f50057 50%, #ff4081 100%);
            --accent-solid: #ff1744;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Roboto', 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Шапка в стиле Google Material (минимализм) */
        header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 64px; 
            background: rgba(18, 18, 18, 0.8); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: center; 
            z-index: 1000; 
        }
        .h-content { 
            width: 1000px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 24px; 
        }
        .h-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 24px; cursor: pointer; transition: transform 0.2s ease; }
        .logo-img:hover { transform: scale(1.02); }
        .h-right { display: flex; align-items: center; gap: 20px; }
        
        /* Кнопка профиля в шапке */
        .h-icon { 
            cursor: pointer; 
            font-size: 14px; 
            color: var(--text-main); 
            text-decoration: none; 
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface-variant);
            border: 1px solid var(--border-color);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .h-icon:hover { 
            background: var(--border-color);
            border-color: #444;
        }

        /* Контейнер */
        .container { 
            width: 1000px; 
            margin-top: 88px; 
            display: flex; 
            gap: 32px; 
            padding: 0 24px;
            box-sizing: border-box;
        }

        /* Навигация а-ля Google Sidebar */
        nav { width: 220px; flex-shrink: 0; }
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
        nav li { 
            padding: 12px 20px; 
            color: var(--text-secondary); 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 500;
            border-radius: 28px; /* Полное скругление по правилам Google M3 */
            transition: all 0.2s ease;
        }
        nav li:hover { 
            background: var(--surface-variant); 
            color: var(--text-main); 
        }

        /* Главная карточка */
        main { 
            flex-grow: 1; 
            background: var(--surface); 
            border: 1px solid var(--border-color); 
            padding: 32px; 
            border-radius: 24px; /* Округлые углы карточек */
            min-height: 400px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }

        /* Округлая аватарка с градиентным бордером */
        .vktr-avatar-wrapper { 
            position: relative; 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; /* Круглая форма */
            overflow: hidden; 
            cursor: pointer; 
            padding: 4px;
            background: var(--gradient-accent); /* Розово-красный светящийся контур */
            box-shadow: 0 8px 20px rgba(245, 0, 87, 0.2);
            transition: transform 0.3s ease;
        }
        .vktr-avatar-wrapper:hover {
            transform: scale(1.03);
        }
        #main-ava { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%;
            background: #222;
        }
        .upload-overlay { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 0.2s ease; 
        }
        .vktr-avatar-wrapper:hover .upload-overlay { opacity: 1; }

        /* Элементы информации */
        .profile-info-block h2 { margin: 0 0 4px 0; font-size: 26px; font-weight: 400; letter-spacing: -0.5px; }
        .profile-info-block p { margin: 0 0 16px 0; color: var(--text-secondary); font-size: 14px; }

        /* Капсульный статус-бар */
        .status-bubble { 
            display: inline-flex; 
            align-items: center;
            background: var(--surface-variant); 
            padding: 10px 20px; 
            border-radius: 20px; 
            font-size: 14px; 
            border: 1px solid var(--border-color); 
            margin-top: 4px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            color: var(--text-main);
        }
        .status-bubble:hover { 
            background: var(--border-color);
            border-color: #555;
        }
        
        /* Модальные окна Google Design */
        .vktr-modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(6px);
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
        }
        .vktr-modal-content { 
            background: var(--surface-variant); 
            padding: 32px; 
            border-radius: 28px; 
            border: 1px solid var(--border-color); 
            width: 360px; 
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
        }
        .vktr-modal-content h3 { margin-top: 0; font-size: 20px; font-weight: 400; text-align: left; margin-bottom: 20px;}

        /* Поля ввода Material */
        .vktr-modal-content input[type="text"] { 
            width: 100%; 
            padding: 14px 16px; 
            background: var(--bg); 
            border: 1px solid var(--border-color); 
            color: white; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .vktr-modal-content input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-solid);
        }

        /* Зона загрузки файлов */
        .file-upload-zone { 
            padding: 24px; 
            border: 2px dashed #444; 
            border-radius: 16px; 
            cursor: pointer; 
            margin-bottom: 24px; 
            background: rgba(255,255,255,0.02);
            transition: all 0.2s ease;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .file-upload-zone:hover {
            border-color: var(--accent-solid);
            background: rgba(255,255,255,0.04);
            color: var(--text-main);
        }

        /* Кнопки в стиле Material You */
        .btn-save { 
            background: var(--gradient-accent); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(245, 0, 55, 0.3);
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-save:hover { opacity: 0.9; }
        .btn-save:active { transform: scale(0.98); }

        .btn-cancel { 
            background: transparent; 
            color: var(--text-secondary); 
            border: 1px solid var(--border-color); 
            padding: 12px 24px; 
            border-radius: 24px; 
            cursor: pointer; 
            margin-left: 8px; 
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .hamster-helper { position: fixed; right: 24px; bottom: 24px; width: 80px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
        #file-input, #music-upload { display: none; }
    </style>
</head>
<body>

<input type="file" id="file-input" accept="image/*">
<header>
    <div class="h-content">
        <div class="h-left">
            <img src="WhiteLogoVKTR.png" alt="VKTR" class="logo-img" onclick="location.href='feed.html'">
        </div>
        <div class="h-right">
            <div class="h-icon" onclick="showProfile()">👤 Профиль</div>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul id="nav-menu">
            <li onclick="showProfile()">Моя Страница</li>
            <li style="margin-top:16px; color:#ff4081" onclick="localStorage.removeItem('vktr_auth_bypass'); location.href='login.html'">Выход</li>
        </ul>
    </nav>
    <main id="content"><h3>Загрузка...</h3></main>
</div>

<div id="status-modal" class="vktr-modal">
    <div class="vktr-modal-content">
        <h3>Установить статус</h3>
        <input type="text" id="new-status-text" placeholder="О чем думаешь?" maxlength="50">
        <div class="file-upload-zone" onclick="document.getElementById('music-upload').click()">
            <span id="file-name-label">🎵 Выбрать аудиофайл</span>
            <input type="file" id="music-upload" accept="audio/*">
        </div>
        <div style="display: flex; justify-content: flex-end;">
            <button onclick="closeStatusModal()" class="btn-cancel">Отмена</button>
            <button onclick="saveNewStatus()" class="btn-save">Поставить</button>
        </div>
    </div>
</div>

<img src="hamster.png" class="hamster-helper" alt="helper">

<script type="module">
    // Твой оригинальный JS-код без изменений, за исключением структуры генерации контента
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    });
    const auth = getAuth(app);

    window.generateUserID = (email) => {
        if (email === 'viktorhridin24@gmail.com') return "00001488";
        let newID;
        do { 
            newID = Math.floor(10000000 + Math.random() * 90000000).toString(); 
        } while (newID.includes("67"));
        return newID;
    };

    const MY_ID = "00001488";
    const IS_MAINTENANCE = true; 
    const currentUserID = localStorage.getItem('vktr_user_id');

    if (IS_MAINTENANCE && currentUserID !== MY_ID) {
        window.location.href = 'maintenance.html';
    }

    onAuthStateChanged(auth, (user) => {
        const isBypass = localStorage.getItem('vktr_auth_bypass') === "true";
        if (user || isBypass) {
            window.currentUserEmail = user ? user.email : 'viktorhridin24@gmail.com';
            let userID = localStorage.getItem('vktr_user_id') || window.generateUserID(window.currentUserEmail);
            localStorage.setItem('vktr_user_id', userID);

            if (IS_MAINTENANCE && userID !== MY_ID) {
                window.location.href = 'maintenance.html';
                return;
            }
            window.showProfile(); 
        } else { 
            window.location.href = "login.html"; 
        }
    });

    // Здесь скорректирована разметка для поддержки новых CSS классов стилизации контента
    window.showProfile = () => {
        const email = window.currentUserEmail || "";
        const isBot = (email === 'vitungg15@gmail.com');
        const isAdmin = (email === 'viktorhridin24@gmail.com' || isBot);
        const name = isBot ? "SYSTEM" : (localStorage.getItem('vktr_name') || email.split('@')[0]);
        const avatar = localStorage.getItem('vktr_avatar') || 'default-avatar_2.png';
        const userID = localStorage.getItem('vktr_user_id');

        document.getElementById('content').innerHTML = `
            <div style="display:flex; gap:32px; align-items: center;">
                <div class="vktr-avatar-wrapper" onclick="document.getElementById('file-input').click()">
                    <img src="${avatar}" id="main-ava">
                    <div class="upload-overlay"><img src="setnewavatar_2.png" style="width:28px;"></div>
                </div>
                <div class="profile-info-block">
                    <h2>${name} ${isAdmin ? '✅' : ''}</h2>
                    <p>ID: ${userID}</p>
                    <div class="status-bubble" onclick="document.getElementById('status-modal').style.display='flex'">
                        💬&nbsp; ${localStorage.getItem('vktr_status_text') || 'В сети'}
                    </div>
                </div>
            </div>`;
    };

    window.closeStatusModal = () => {
        document.getElementById('status-modal').style.display = 'none';
    };

    window.saveNewStatus = () => {
        localStorage.setItem('vktr_status_text', document.getElementById('new-status-text').value);
        const file = document.getElementById('music-upload').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { localStorage.setItem('vktr_status_music', e.target.result); window.showProfile(); };
            reader.readAsDataURL(file);
        } else { window.showProfile(); }
        document.getElementById('status-modal').style.display = 'none';
    };

    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = ev => { localStorage.setItem('vktr_avatar', ev.target.result); window.showProfile(); };
        reader.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
