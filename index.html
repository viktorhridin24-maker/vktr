<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VKTR | Portal</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        header { position: fixed; top: 0; width: 100%; height: 45px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: center; z-index: 1000; }
        .h-content { width: 800px; display: flex; align-items: center; }

        .container { width: 800px; margin-top: 65px; display: flex; gap: 20px; }
        nav { width: 160px; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 5px 0; color: #d1d1d1; cursor: pointer; font-size: 13px; }

        main { flex-grow: 1; background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 4px; min-height: 300px; }

        .vktr-avatar-wrapper { position: relative; width: 120px; height: 120px; background: #222; overflow: hidden; border: 1px solid #444; cursor: pointer; }
        #main-ava { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        .box-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .box { background: #181818; width: 350px; border: 1px solid #444; border-radius: 8px; padding: 20px; }
        .crop-zone { width: 200px; height: 200px; border: 1px dashed var(--accent); margin: 0 auto 15px; position: relative; overflow: hidden; background: #000; }
        #crop-img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<script>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ВОТ ЭТА ПРОВЕРКА ИСПРАВЛЯЕТ ВЫЛЕТ В ЛОГИН
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Если юзер есть, пишем его почту в хедер (как на твоем видео Record_2026_05_01_09_53_59_818.mp4)
            document.getElementById('display-name').innerText = user.email;
            console.log("Доступ разрешен:", user.email);
        } else {
            // Если юзера нет — только тогда гоним в логин
            console.log("Юзер не залогинен, уходим на Login.html");
            window.location.href = "Login.html";
        }
    });
</script>

<div id="box-overlay" class="box-overlay">
    <div class="box">
        <h4 style="margin-top:0">Редактор миниатюры</h4>
        <div class="crop-zone"><img src="https://via.placeholder.com/200" id="crop-img" draggable="false"></div>
        <input type="range" id="zoom" min="1" max="3" step="0.01" value="1" style="width:100%; accent-color:red">
        <button class="btn" onclick="save()">Сохранить</button>
    </div>
</div>

<header><div class="h-content"><strong>VKTR</strong></div></header>

<div class="container">
    <nav><ul><li onclick="showProfile()">Моя Страница</li></ul></nav>
    <main id="content"><h3>Загрузка системы...</h3></main>
</div>

<script>
    // Твоя рабочая логика аватарки
    let avatarData = { src: 'https://via.placeholder.com/200', z: 1, x: 0, y: 0 };
    
    function showProfile() {
        const f = 120/200; 
        document.getElementById('content').innerHTML = `
            <h3>Профиль: vktr_user_1</h3>
            <div class="vktr-avatar-wrapper" onclick="document.getElementById('box-overlay').style.display='flex'">
                <img src="${avatarData.src}" id="main-ava" style="transform: translate(${avatarData.x*f}px, ${avatarData.y*f}px) scale(${avatarData.z})">
            </div>
        `;
    }

    function save() {
        document.getElementById('box-overlay').style.display = 'none';
        showProfile();
    }
    
    // Инициализация интерфейса после проверки
    setTimeout(showProfile, 500);
</script>
</body>
</html>
