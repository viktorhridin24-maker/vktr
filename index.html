<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr | Автономный Портал</title>
    <link rel="icon" type="image/png" href="faricon_vktr.png">
    
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { 
            background: #0a0a0a; border-bottom: 2px solid #ff4141; 
            padding: 10px 30px; display: flex; justify-content: space-between; align-items: center;
        }
        .v-logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 900; color: #ff4141; }
        .v-logo img { width: 30px; } /* Маленькое лого в шапке */
        
        .main-grid { display: grid; grid-template-columns: 250px 1fr; gap: 30px; padding: 40px; }
        .sidebar { border-right: 1px solid #111; }
        .content-box { background: #050505; border: 1px solid #1a1a1a; padding: 25px; border-radius: 12px; }
        
        .nav-link { display: block; padding: 12px; color: #888; text-decoration: none; transition: 0.3s; }
        .nav-link:hover { color: #ff4141; padding-left: 20px; }
    </style>
</head>
<body>

<header>
    <div class="v-logo">
        <img src="faricon_vktr.png" alt="logo"> vktr
    </div>
    <div class="user-stats">
        <span>Баланс: <strong style="color:#ff4141;">7789</strong></span>
    </div>
</header>

<div class="main-grid">
    <aside class="sidebar">
        <a href="#" class="nav-link">🔒 Безопасность</a>
        <a href="#" class="nav-link">🛠 Услуги</a>
        <a href="#" class="nav-link">📁 Файлы</a>
        <a href="#" class="nav-link" style="color: #ff4141;" onclick="activateEmergency()">⚠️ Экстренный режим</a>
    </aside>

    <main>
        <div class="content-box">
            <h1>Добро пожаловать в систему</h1>
            <p>Это не мессенджер и не игра. Это твоя точка доступа к защищенным данным.</p>
            <hr style="border: 0; border-top: 1px solid #1a1a1a; margin: 20px 0;">
            <h3>Текущий статус:</h3>
            <p style="color: #00ff00;">● Все системы vktrserver работают в штатном режиме.</p>
        </div>
    </main>
</div>

<script>
    function activateEmergency() {
        // Режим Балды при попытке захвата
        document.body.innerHTML = '<video autoplay loop style="width:100%"><source src="15805.mp4"></video>';
        const audio = new Audio('vktr music.mp3');
        audio.play();
    }
</script>

</body>
</html>
