<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vktr — портал услуг</title>
    <style>
        /* Общие настройки */
        :root {
            --main-gradient: linear-gradient(135deg, #4b0000 0%, #ff007f 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00e1ff;
        }

        body {
            background: var(--main-gradient);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Шапка сайта */
        header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand h1 {
            font-size: 1.8em;
            margin: 0;
            letter-spacing: 1px;
            text-transform: lowercase; /* Строго vktr */
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1em;
            transition: 0.3s;
            position: relative;
        }

        nav a:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent);
            transition: 0.3s;
        }

        nav a:hover:after {
            width: 100%;
        }

        /* Главный блок */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 50px;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 2.5em; margin-bottom: 10px; }
        .status-tag {
            display: inline-block;
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        /* Секция траура */
        #mourning-section {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-f {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            transition: 0.3s;
        }

        .btn-f:hover { background: #ccc; transform: scale(1.05); }

            background: rgba(0, 0, 0, 0.4);
            padding: 30px
