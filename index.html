<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        .container { width: 800px; margin-top: 65px; }
        main { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 4px; }

        /* --- ИСПРАВЛЕННЫЙ КОНТЕЙНЕР --- */
        .vktr-avatar-wrapper { 
            position: relative; 
            width: 120px; 
            height: 120px; 
            background: #000; 
            overflow: hidden; 
            border: 1px solid #444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #main-ava { 
            position: absolute; 
            /* Убираем зависимость от ширины в процентах, используем трансформацию */
            width: 100%; 
            height: 100%;
            object-fit: contain; /* Чтобы картинка не искажалась */
            display: block;
            pointer-events: none;
        }

        .vktr-upload-btn { 
            position: absolute; 
            bottom: -100%; 
            left: 0; 
            width: 100%; 
            transition: bottom 0.2s ease;
            z-index: 10;
        }

        .vktr-avatar-wrapper:hover .vktr-upload-btn { bottom: 0; }

        /* ОКНО МАКЕТА */
        .box-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .box { background: #181818; width: 400px; border: 1px solid #444; border-radius: 8px; padding: 20px; text-align: center; }
        .crop-zone { width: 200px; height: 200px; border: 2px dashed var(--accent); margin: 0 auto 15px; position: relative; overflow: hidden; }
        #crop-img { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="box-overlay" class="box-overlay">
    <div class="box">
        <h4>Редактор миниатюры</h4>
        <div class="crop-zone" id="crop-zone">
            <img src="default-avatar.png" id="crop-img" draggable="false">
        </div>
        <input type="range" id="zoom" min="1" max="5" step="0.01" value="1" style="width:100%; accent-color:red">
        <button class="btn" onclick="save()">Сохранить результат</button>
    </div>
</div>

<div class="container">
    <main id="content">
        <button class="btn" style="width:auto" onclick="showProfile()">Показать профиль</button>
    </main>
</div>

<script>
    let data = { src: 'https://i.imgur.com/8Km9tPg.png', z: 1, x: 0, y: 0 };
    let drag = false, sx, sy;

    const zone = document.getElementById('crop-zone');
    const cImg = document.getElementById('crop-img');
    
    zone.onmousedown = (e) => { drag = true; sx = e.clientX - data.x; sy = e.clientY - data.y; };
    window.onmousemove = (e) => {
        if (!drag) return;
        data.x = e.clientX - sx; data.y = e.clientY - sy;
        cImg.style.transform = `translate(${data.x}px, ${data.y}px) scale(${data.z})`;
    };
    window.onmouseup = () => drag = false;
    
    document.getElementById('zoom').oninput = (e) => { 
        data.z = e.target.value; 
        cImg.style.transform = `translate(${data.x}px, ${data.y}px) scale(${data.z})`; 
    };

    function showProfile() {
        // Здесь мы используем translate для позиционирования, это надежнее чем left/top
        const factor = 120 / 200; 
        document.getElementById('content').innerHTML = `
            <h3>Профиль: vktr_user_1</h3>
            <div class="vktr-avatar-wrapper" onclick="document.getElementById('box-overlay').style.display='flex'">
                <img src="${data.src}" id="main-ava" 
                     style="transform: translate(${data.x * factor}px, ${data.y * factor}px) scale(${data.z})">
                <img src="setnewavatar.png" class="vktr-upload-btn">
            </div>
            <p style="color:#888; font-size:12px; margin-top:10px;">vktrID</p>
        `;
    }

    function save() {
        document.getElementById('box-overlay').style.display = 'none';
        showProfile();
    }
</script>
</body>
</html>
