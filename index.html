<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr</title>
    <style>
        /* ГРАДИЕНТНЫЙ ФОН */
        body {
            background: linear-gradient(135deg, #ff0080 0%, #ff0000 100%);
            background-attachment: fixed;
            margin: 0;
            font-family: 'Tahoma', sans-serif;
            color: #fff;
        }

        /* HEADER С ПОДПИСКАМИ */
        header {
            background: rgba(0, 0, 0, 0.9);
            height: 45px;
            display: none; /* Скрыт до входа */
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #ffd700;
        }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none;
            position: absolute;
            background: white;
            min-width: 150px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 5px;
            top: 30px;
        }
        .dropdown-content a { color: black; padding: 10px; text-decoration: none; display: block; font-size: 12px; }
        .dropdown:hover .dropdown-content { display: block; }

        /* ФОРМЫ И КАРТОЧКИ */
        .vktr-card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            margin: 40px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: none;
        }

        /* КНОПКИ-ФАРЫ */
        .vktr-btn {
            background: linear-gradient(to bottom, #ff4d4d 0%, #b30000 100%);
            color: white;
            padding: 10px 20px;
            border: 1px solid #700000;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #800000;
        }

        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        #auth-screen { display: block; width: 350px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="vktr-card" style="display:block;">
        <div id="login-fields">
            <h2 style="color:#b30000">ВХОД vktr</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" placeholder="Пароль">
            <button class="vktr-btn" onclick="showStep2()">Войти</button>
            <p style="font-size:12px; cursor:pointer; color:#666" onclick="toggleAuth()">Вы тут новички? Перейдите на регистрацию</p>
        </div>
        <div id="name-field" style="display:none">
            <h2 style="color:#ff0080">Кто это?</h2>
            <input type="text" id="user-nick" placeholder="Ваш Тэг (Ник)">
            <button class="vktr-btn" onclick="completeLogin()">Завершить вход</button>
        </div>
    </div>

    <header id="main-header">
        <div>
            <span onclick="showPage('main')" style="cursor:pointer">Главная</span> | 
            <div class="dropdown">
                <span style="color:#ffd700; cursor:pointer">Все подписки ▼</span>
                <div class="dropdown-content">
                    <a href="#">vktrMini</a>
                    <a href="#">vktrDream</a>
                    <a href="#">vktrPro </a>
                </div>
            </div> |
            <span onclick="showPage('forum')" style="cursor:pointer">💬 Форум</span>
        </div>
        <div>
            <span onclick="showPage('cabinet')" style="cursor:pointer">⚙️ Кабинет</span>
            <span id="header-nick" style="margin-left:15px; font-weight:bold; color:#ffd700;"></span>
        </div>
    </header>

    <div id="page-main" class="vktr-card">
        <h1>vktr Feed</h1>
        <p>Ваш статус: <b id="status-val">Новичок</b></p>
        <button class="vktr-btn">vktrBook</button>
        <hr>
        <h3>Отправьте вашу идею в vktr!:</h3>
        <textarea id="ideaInput" placeholder="Опишите идею..."></textarea>
        <button class="vktr-btn" onclick="sendIdea()">Отправить</button>
    </div>

    <div id="page-cabinet" class="vktr-card">
        <h2>Настройки Профиля</h2>
        <label>Смена Тэга:</label>
        <input type="text" id="new-tag" placeholder="Новый ник">
        <label>Смена Статуса:</label>
        <input type="text" id="new-status" placeholder="Ваш статус...">
        <hr>
        <h3>💵 Монетизация</h3>
        <p>Баланс: <b>1000 Пузырей</b></p>
        <button class="vktr-btn" style="background:green;">Вывод в Гривны</button>
        <br><br>
        <button class="vktr-btn" onclick="updateProfile()">Сохранить изменения</button>
    </div>

    <div id="page-messages" class="vktr-card">
        <h2>Идеи</h2>
        <div id="admin-inbox">Входящих нет.</div>
    </div>

    <script>
        function showStep2() { 
            document.getElementById('login-fields').style.display = 'none';
            document.getElementById('name-field').style.display = 'block';
        }

        function completeLogin() {
            const nick = document.getElementById('user-nick').value || "User";
            localStorage.setItem('vktr_user', nick);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            showPage('main');
            document.getElementById('header-nick').innerText = nick;
        }

        function showPage(id) {
            document.querySelectorAll('.vktr-card').forEach(c => c.style.display = 'none');
            document.getElementById('page-' + id).style.display = 'block';
            if (id === 'messages') loadAdminInbox();
        }

        function updateProfile() {
            const tag = document.getElementById('new-tag').value;
            const stat = document.getElementById('new-status').value;
            if(tag) document.getElementById('header-nick').innerText = tag;
            if(stat) document.getElementById('status-val').innerText = stat;
            alert("Данные сохранены.");
        }

        function sendIdea() {
            const idea = document.getElementById('ideaInput').value;
            let inbox = JSON.parse(localStorage.getItem('vktr_inbox') || "[]");
            inbox.push({ from: localStorage.getItem('vktr_user'), text: idea });
            localStorage.setItem('vktr_inbox', JSON.stringify(inbox));
            alert("Идея отправлена Виктору!");
            document.getElementById('ideaInput').value = "";
        }
