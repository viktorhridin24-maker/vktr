<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr </title>
    <style>
        body {
            background: linear-gradient(135deg, #ff0080 0%, #ff0000 100%);
            background-attachment: fixed;
            margin: 0;
            font-family: 'Tahoma', sans-serif;
            color: #fff;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #ffd700;
        }

        .auth-container {
            background: white;
            color: #000;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: 100px auto;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            max-width: 900px;
            margin: 30px auto;
            border-radius: 15px;
            padding: 25px;
            display: none; /* Скрыто до входа */
        }

        .vktr-btn {
            background: linear-gradient(to bottom, #ff4d4d 0%, #b30000 100%);
            color: white;
            padding: 10px 18px;
            border: 1px solid #700000;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        .nav-link { cursor: pointer; margin-right: 15px; font-size: 13px; }
        
        input, select, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .status-badge {
            background: #000;
            color: #ffd700;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div id="login-form">
            <h2 style="color:#b30000">Вход в vktr</h2>
            <input type="text" id="login-email" placeholder="E-mail">
            <input type="password" placeholder="Пароль">
            <button class="vktr-btn" style="width:100%" onclick="login()">Войти</button>
            <p style="font-size:12px; cursor:pointer" onclick="toggleAuth(true)">Вы тут новички? Перейдите на регистрацию</p>
        </div>
        
        <div id="reg-form" style="display:none">
            <h2 style="color:#ff0080">РЕГИСТРАЦИЯ</h2>
            <input type="text" id="reg-email" placeholder="E-mail">
            <input type="text" id="reg-nick" placeholder="Придумайте Тэг (Ник)">
            <input type="password" placeholder="Пароль">
            <button class="vktr-btn" style="width:100%" onclick="login()">Создать аккаунт</button>
            <p style="font-size:12px; cursor:pointer" onclick="toggleAuth(false)">Есть аккаунт? Войти</p>
        </div>
    </div>

    <header id="site-header" style="display:none">
        <div class="nav-links">
            <span class="nav-link" onclick="showPage('main')">Главная</span>
            <span class="nav-link" onclick="showPage('messages')">Сообщения</span>
        </div>
        <div>
            <span class="nav-link" onclick="showPage('cabinet')">Кабинет</span>
            <span id="header-nick" style="font-weight:bold; color:#ffd700"></span>
        </div>
    </header>

    <div id="main-site" class="main-card">
        
        <div id="page-cabinet" class="page">
            <h2>⚙️ Настройки Профиля</h2>
            <div style="display:flex; gap:20px; align-items:center">
                <div id="avatar-preview" style="width:80px; height:80px; background:#ddd; border-radius:50%; border:2px solid #ff4d4d"></div>
                <input type="file" id="avatar-input" style="width:auto" onchange="previewFile()">
            </div>
            
            <label>Ваш Тэг (Ник):</label>
            <input type="text" id="set-nick" placeholder="Тут будет ваш тэг...">
            
            <label>Ваш Статус:</label>
            <input type="text" id="set-status" placeholder="Впишите свой статус...">
            
            <hr>
            <h3>💵 Монетизация</h3>
            <p>Баланс: <b>1000 Пузырей</b></p>
            <button class="vktr-btn" style="background:#4a6d1a">Почитать статью о Пузырях</button>
            
            <br><br>
            <button class="vktr-btn" onclick="saveSettings()">Сохранить всё</button>
        </div>

        <div id="page-messages" class="page" style="display:none">
            <h2>✉️ Личные сообщения</h2>
            <div id="msg-box" style="background:#f9f9f9; padding:15px; border-radius:10px; border:1px solid #ddd">
                <p style="color:#666">У вас нету новых сообщений.</p>
            </div>
        </div>

        <div id="page-main" class="page" style="display:none">
            <h1>vktr Feed</h1>
            <p>Добро пожаловать, <span id="user-display"></span> Твой статус: <i id="status-display">...</i></p>
            <button class="vktr-btn">Форум</button>
        </div>
    </div>

    <script>
        function toggleAuth(isReg) {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
        }

        function login() {
            const nick = document.getElementById('reg-nick').value || "User";
            localStorage.setItem('vktr_nick', nick);
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('site-header').style.display = 'flex';
            document.getElementById('main-site').style.display = 'block';
            
            showPage('main');
            document.getElementById('header-nick').innerText = nick;
            document.getElementById('user-display').innerText = nick;
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + pageId).style.display = 'block';
        }

        function saveSettings() {
            const newNick = document.getElementById('set-nick').value;
            const newStatus = document.getElementById('set-status').value;
            
            if(newNick) document.getElementById('header-nick').innerText = newNick;
            if(newStatus) document.getElementById('status-display').innerText = newStatus;
            
            alert("Все настройки сохранены.");
        }

        function previewFile() {
            alert("Аватарка будет загружена в репозиторий после подтверждения!");
        }
    </script>
</body>
</html>
