        function renderProfile(id) {

                </div>
                <input type="file" id="vktr-ava-input" hidden accept="image/*" onchange="window.vktrUpdateAva(event)">

            <!-- Инфо и Музыка -->

    `;
}

        // Следим за кнопками "Назад/Вперед" в браузере
        window.onpopstate = () => {
            const path = window.location.pathname;
            if(path.includes('/profile/')) {
                const id = path.split('/').pop();
                renderProfile(id);
            }
        };
