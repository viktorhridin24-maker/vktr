<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Портал услуг</title>
    
    <!-- Твой обновленный фавикон -->
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-red: #e60000;
            --header-bg: rgba(22, 22, 22, 0.95);
            --sidebar-width: 240px;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* Фиксированный Хедер */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }

        .logo img {
            height: 30px;
        }

        /* Боковая панель */
        .sidebar {
            position: fixed;
            left: 0;
            top: 60px;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--card-bg);
            border-right: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-btn {
            background: transparent;
            color: white;
            border: none;
            text-align: left;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar-btn:hover {
            background: rgba(230, 0, 0, 0.1);
            color: var(--accent-red);
        }

        /* Основной контент */
        main {
            margin-top: 80px;
            margin-left: calc(var(--sidebar-width) + 40px);
            padding: 20px;
            max-width: 800px;
        }

        .vktr-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #333;
            padding: 25px;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
        }

        .vktr-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-buy {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .footer-info {
            font-size: 11px;
            color: #666;
            margin-top: 40px;
        }
        
        .footer-info a { color: var(--accent-red); text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="WhiteLogoVKTR.png" alt="VKTR LOGO">
        </div>
        <div class="header-right">
            <span>7789 🫧</span>
            <button class="sidebar-btn" style="padding: 5px 10px;">Настройки</button>
        </div>
    </header>

    <div class="sidebar">
        <button class="sidebar-btn">🏠 Главная</button>
        <button class="sidebar-btn">🛠️ Услуги</button>
        <button class="sidebar-btn">👥 Люди</button>
        <button class="sidebar-btn">⚙️ Настройки ID</button>
    </div>

    <main>
        <div class="vktr-card">
            <h2>🐱 Meowl.Social Premium</h2>
            <p>Подписка на премиум-возможности от нашего партнёра Meowl.</p>
            <p>Стоимость: <strong>500 🫧</strong></p>
            <button class="btn-buy">Активировать за пузырьки</button>
        </div>

        <div class="footer-info">
            При регистрации на сайт вы принимаете наши 
            <a href="privacy.html">условия Конфиденциальности</a> и 
            <a href="rules.html">правила</a>.
        </div>
    </main>

    <script>
        // Анимация карточек
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        });
        document.querySelectorAll('.vktr-card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
