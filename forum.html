<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Forum</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; --header-bg: #222; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        header { 
            position: fixed; top: 0; width: 100%; height: 48px; 
            background: var(--header-bg); border-bottom: 1px solid #444; 
            display: flex; justify-content: center; z-index: 1000; 
        }
        .h-content { width: 1000px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .logo-img { height: 30px; cursor: pointer; }

        .container { width: 1000px; margin-top: 65px; display: flex; gap: 20px; }
        
        /* Навигация */
        nav { width: 180px; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { padding: 7px 10px; color: #d1d1d1; cursor: pointer; font-size: 13px; border-radius: 4px; }
        nav li:hover { background: #222; color: #fff; }

        /* Контент форума */
        main { flex-grow: 1; background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 4px; }
        
        .forum-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-create { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }

        /* Стили списка тем */
        .topic-item { 
            background: #1d1d1d; border: 1px solid #333; padding: 15px; 
            border-radius: 4px; margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center;
            transition: 0.2s; cursor: pointer;
        }
        .topic-item:hover { border-color: var(--accent); background: #222; }
        .topic-info h4 { margin: 0 0 5px 0; color: #fff; }
        .topic-info span { font-size: 11px; color: #777; }
        .topic-meta { text-align: right; font-size: 12px; color: #aaa; }

        .hamster-helper { position: fixed; right: 20px; bottom: 20px; width: 90px; }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <div class="h-left">
            <img src="logo_vktr.png" alt="VKTR" class="logo-img" onclick="location.href='index.html'">
        </div>
        <div class="h-right" style="font-size: 14px; opacity: 0.8;">VKTR Forum v1.0</div>
    </div>
</header>

<div class="container">
    <nav>
        <ul>
            <li onclick="location.href='index.html'">На главную</li>
            <li style="color: var(--accent); font-weight: bold;">Все разделы</li>
            <li>Мои темы</li>
            <li>Закладки</li>
            <li style="margin-top:20px; color:#666" onclick="location.href='login.html'">Выход</li>
        </ul>
    </nav>

    <main id="forum-main">
        <div class="forum-header">
            <h2 style="margin:0;">Обсуждения</h2>
            <button class="btn-create" onclick="createNewTopic()">+ Создать тему</button>
        </div>

        <div id="topics-list">
            <!-- Пример темы -->
            <div class="topic-item">
                <div class="topic-info">
                    <h4>Добро пожаловать на обновленный VKTR Forum!</h4>
                    <span>Автор: <b>SYSTEM</b> • 20 мин. назад</span>
                </div>
                <div class="topic-meta">
                    <div>💬 12</div>
                    <div>👁️ 45</div>
                </div>
            </div>

            <div class="topic-item">
                <div class="topic-info">
                    <h4>Как вам новый дизайн портала?</h4>
                    <span>Автор: <b>Миша</b> • 1 час назад</span>
                </div>
                <div class="topic-meta">
                    <div>💬 5</div>
                    <div>👁️ 112</div>
                </div>
            </div>
        </div>
    </main>
</div>

<img src="hamster.png" class="hamster-helper" alt="helper">

<script>
    function createNewTopic() {
        const title = prompt("Введите название новой темы:");
        if (title) {
            const list = document.getElementById('topics-list');
            const newTopic = document.createElement('div');
            newTopic.className = 'topic-item';
            newTopic.innerHTML = `
                <div class="topic-info">
                    <h4>${title}</h4>
                    <span>Автор: <b>Виктор</b> • только что</span>
                </div>
                <div class="topic-meta">
                    <div>💬 0</div>
                    <div>👁️ 1</div>
                </div>
            `;
            list.prepend(newTopic);
            alert("Тема создана! (Пока сохраняется только локально)");
        }
    }
</script>

</body>
</html>
