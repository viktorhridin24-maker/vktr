<!DOCTYPE html>
<html>
<head>
    <title>vktr — идеи</title>
    <style>
        body { background: #f0f0f0; color: #000; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .nav { background: #d90000; padding: 15px 30px; }
        .nav a { color: #fff; text-decoration: none; font-weight: bold; text-transform: lowercase; }
        
        .main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .idea-card { background: #fff; padding: 40px; border-top: 10px solid #d90000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        
        h1 { text-transform: lowercase; margin-bottom: 10px; }
        .build-status { color: #d90000; font-weight: bold; margin-bottom: 20px; display: block; }
        
        textarea { width: 100%; height: 120px; border: 1px solid #ddd; padding: 15px; box-sizing: border-box; margin-bottom: 20px; resize: none; font-size: 16px; }
        
        .btn-send { background: #000; color: #fff; border: none; padding: 15px 30px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-send:hover { background: #d90000; }
        
        .footer { padding: 20px; text-align: center; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">vktr</a>
    </div>

    <div class="main">
        <div class="idea-card">
            <span class="build-status">Эта страница строится.</span>
            <h1>предложите идею!</h1>
            <p>мы создаем портал вместе. напиши, что добавить на эту страницу, и админы рассмотрят твое предложение.</p>
            
            <textarea id="ideaText" placeholder="опиши свою идею здесь..."></textarea>
            
            <button class="btn-send" onclick="sendIdea()">отправить админу</button>
        </div>
    </div>

    <div class="footer">
        © 2026 vktr team
    </div>

    <script>
        function sendIdea() {
            const text = document.getElementById('ideaText').value;
            if (!text.trim()) {
                alert('сначала напиши идею.');
                return;
            }

            // Твой ник или ник админа для темы письма
            const adminName = "viktqr"; 
            const subject = encodeURIComponent(`Идея для vktr от пользователя`);
            const body = encodeURIComponent(text);

            // Открывает почтовый клиент с предзаполненным текстом
            // Замени 'твой-email@example.com' на свой реальный адрес
            window.location.href = `mailto:твой-email@example.com?subject=${subject}&body=${body}`;
            
            alert('открываю почту для отправки идеи!');
        }
    </script>

</body>
