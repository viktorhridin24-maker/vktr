<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Forum Feed</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        header { position: fixed; top: 0; width: 100%; height: 48px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: center; z-index: 1000; }
        .h-content { width: 1000px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .container { width: 1000px; margin-top: 65px; display: flex; gap: 20px; padding-bottom: 50px; }
        nav { width: 180px; }
        nav li { padding: 10px; color: #d1d1d1; cursor: pointer; font-size: 13px; }
        main { flex-grow: 1; max-width: 650px; }
        .post-card { background: var(--card); border: 1px solid #333; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <div style="font-size: 13px;">VKTR FORUM</div>
    </div>
</header>

<div class="container">
    <nav>
        <ul style="list-style: none; padding: 0;">
            <li>🔥 Свежее</li>
            <li>💬 Мои посты</li>
        </ul>
    </nav>

    <main>
        <div style="background: #111; border: 1px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 25px;">
            <input type="text" placeholder="Заголовок" style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 4px;">
            <textarea placeholder="Текст поста" rows="3" style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 4px;"></textarea>
            <button style="background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; float: right;">Опубликовать</button>
            <div style="clear:both"></div>
        </div>
        <div id="feed" style="color: #ccc;">Загрузка ленты...</div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const IS_MAINTENANCE = false;

    onAuthStateChanged(auth, (user) => {
        const isBypass = localStorage.getItem('vktr_auth_bypass') === "true" || !user;
        if (user || isBypass) {
            localStorage.setItem('vktr_auth_bypass', 'true');
            document.getElementById('feed').innerHTML = 'Форум загружен';
        } else {
            location.href = "login.html";
        }
    });
</script>

</body>
</html>
