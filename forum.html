<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>vktr — форум</title>
    <style>
        body { background: #f0f0f0; font-family: sans-serif; margin: 0; }
        .nav { background: #d90000; padding: 15px; color: #fff; display: flex; justify-content: space-between; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .post-input { background: #fff; padding: 20px; border-left: 5px solid #d90000; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; }
        .post { background: #fff; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; position: relative; }
        .post-id { font-size: 10px; color: #999; position: absolute; top: 5px; right: 10px; }
        .post-author { color: #d90000; font-weight: bold; font-size: 14px; }
        .system-msg { background: #fffbe6; border: 1px solid #ffe58f; padding: 10px; margin-bottom: 10px; font-size: 13px; color: #856404; }
    </style>
</head>
<body>

<div class="nav">
    <b style="text-transform: lowercase;">форум</b>
    <span id="user-display">гость</span>
</div>

<div class="container">
    <div id="system-alerts">
        <div class="system-msg">system: добро пожаловать на форум vktr.</div>
    </div>

    <div class="post-input">
        <textarea id="postText" placeholder="что нового?"></textarea>
        <button onclick="addPost()" style="background:#000; color:#fff; border:none; padding:10px 20px; cursor:pointer;">запостить</button>
    </div>

    <div id="posts-list">
        </div>
</div>

<script>
    const user = localStorage.getItem('vktr_user') || 'гость';
    document.getElementById('user-display').innerText = user;

    function addPost() {
        const text = document.getElementById('postText').value;
        if (!text) return;

        const postId = Math.floor(Math.random() * 900000) + 100000; // Генерация ID
        const postHtml = `
            <div class="post">
                <span class="post-id">ID: #${postId}</span>
                <div class="post-author">${user}</div>
                <div class="post-content">${text}</div>
            </div>
        `;
        
        document.getElementById('posts-list').innerHTML = postHtml + document.getElementById('posts-list').innerHTML;
        document.getElementById('postText').value = '';
        
        // Системное уведомление об успешном посте
        const alert = document.createElement('div');
        alert.className = 'system-msg';
        alert.innerText = `сообщение #${postId} успешно опубликовано.`;
        document.getElementById('system-alerts').prepend(alert);
    }
</script>

</body>
</html>
