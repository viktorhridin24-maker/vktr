<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@300;400;500;600&display=swap');

        :root {
            --accent: #e60000;
            --accent-light: #ff3333;
            --accent-dim: #b30000;
            --bg: #0a0a0a;
            --card: rgba(12, 12, 12, 0.82);
            --card-border: rgba(255,255,255,0.07);
            --header-bg: rgba(10,10,10,0.92);
            --text: #f0f0f0;
            --text-muted: #999;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Jost', tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 15% 10%, rgba(230, 0, 0, 0.28) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 80%, rgba(255, 60, 60, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(180, 0, 0, 0.10) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle noise grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' result='noise'/%3E%3C/filter%3E%3Crect width='200' height='200' fill='white' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 52px;
            background: var(--header-bg);
            border-bottom: 1px solid rgba(230,0,0,0.25);
            display: flex;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(14px);
        }

        .h-content {
            width: 1000px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .h-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 28px; cursor: pointer; filter: brightness(1.05); }

        /* Red accent line under logo */
        .logo-wrap {
            position: relative;
            padding-bottom: 3px;
        }
        .logo-wrap::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 2px;
        }

        .h-right { display: flex; align-items: center; gap: 20px; }

        .h-icon {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.25s;
            font-size: 13px;
            letter-spacing: 0.5px;
            font-weight: 500;
            text-decoration: none;
        }
        .h-icon:hover { color: var(--text); }

        .container {
            width: 1000px;
            margin-top: 72px;
            display: flex;
            gap: 22px;
            position: relative;
            z-index: 1;
            padding-bottom: 40px;
        }

        nav { width: 190px; flex-shrink: 0; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li {
            padding: 9px 13px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.4px;
            font-weight: 400;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        nav li:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text);
        }
        nav li.active {
            color: #fff;
            background: rgba(230,0,0,0.15);
            border-left: 2px solid var(--accent);
            padding-left: 11px;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 12px 0;
        }

        main {
            flex-grow: 1;
            background: var(--card);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 10px;
            min-height: 500px;
            backdrop-filter: blur(18px);
            position: relative;
            overflow: hidden;
        }

        /* Subtle red corner glow on card */
        main::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(230,0,0,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <div class="h-left">
            <div class="logo-wrap">
                <img src="WhiteLogoVKTR.png" alt="VKTR" class="logo-img" onclick="location.href='feed.html'" onerror="this.style.display='none'">
            </div>
        </div>
        <div class="h-right">
            <a class="h-icon" onclick="location.href='profile.html'">👤 Кабинет</a>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul id="nav-menu">
            <li id="nav-feed" class="active" onclick="changeTab('feed')">Лента</li>
            <li id="nav-profile" onclick="changeTab('profile')">Профиль</li>
            <div class="nav-divider"></div>
            <li style="color:#e04040" onclick="logout()">Выход</li>
        </ul>
    </nav>
    <main id="content">
        <h3 style="color:var(--text-muted); font-weight:300; letter-spacing:1px;">Загрузка...</h3>
    </main>
</div>
    
<div class="eurovision-banner" style="background: linear-gradient(135deg, #b30000, #e60000); color: white; padding: 25px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(230,0,0,0.15);">
                    <div style="max-width: 60%; text-align: left;">
                        <h3 style="margin: 0 0 10px 0; font-size: 20px; font-family: 'Jost', sans-serif; font-weight:600;">Скоро будет Цитрусовые Скидки!</h3>
                        <p style="margin: 0 0 18px 0; font-size: 13px; color: #fff; line-height: 1.4; opacity: 0.9;">
                            А именно, ООпельсины и Ультриматиум. ООпельсины - это счет, созданный специально для участников vktr team и других активных пользователей, будьте первыми!
                        </p>
                        <button onclick="changeTab('profile')" style="background: white; color: #e60000; border: none; padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; font-family:'Jost', sans-serif; transition: 0.2s;">Погнали!</button>
                    </div>
                    <div style="max-width: 35%;">
                        <img src="oopelsinyvktr.png" alt="Citrusing, ya!" style="width: 100%; border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                    </div>
                </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    });
    const auth = getAuth(app);

    const MY_ID = "00001488";
    const IS_MAINTENANCE = false;

    window.generateUserID = (email) => {
        if (email === 'viktorhridin24@gmail.com') return "00001488";
        let newID;
        do {
            newID = Math.floor(10000000 + Math.random() * 90000000).toString();
        } while (newID.includes("67"));
        return newID;
    };

    onAuthStateChanged(auth, (user) => {
        const isBypass = localStorage.getItem('vktr_auth_bypass') === "true" || !user;
        if (user || isBypass) {
            window.currentUserEmail = user ? user.email : 'viktorhridin24@gmail.com';
            let userID = localStorage.getItem('vktr_user_id') || window.generateUserID(window.currentUserEmail);
            localStorage.setItem('vktr_user_id', userID);
            localStorage.setItem('vktr_auth_bypass', 'true');

            if (IS_MAINTENANCE && userID !== MY_ID) {
                window.location.href = 'maintenance.html';
                return;
            }

            window.changeTab('feed');
        } else {
            window.location.href = "login.html";
        }
    });

    window.changeTab = (tab) => {
        document.querySelectorAll('nav li').forEach(el => el.classList.remove('active'));
        if (tab === 'feed') {
            document.getElementById('nav-feed').classList.add('active');
            document.getElementById('content').innerHTML = '<h2 style="color:#fff;">Лента услуг</h2>';
        } else {
            document.getElementById('nav-profile').classList.add('active');
            document.getElementById('content').innerHTML = '<h2 style="color:#fff;">Профиль</h2>';
        }
    };

    window.logout = () => {
        localStorage.removeItem('vktr_auth_bypass');
        window.location.href = 'login.html';
    };
</script>

</body>
</html>
