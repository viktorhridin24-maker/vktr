<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Feed & Services</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; --header-bg: #222; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        header { 
            position: fixed; top: 0; width: 100%; height: 48px; 
            background: var(--header-bg); border-bottom: 1px solid #444; 
            display: flex; justify-content: center; z-index: 1000; 
        }
        .h-content { width: 1000px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .h-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 30px; cursor: pointer; }
        .h-right { display: flex; align-items: center; gap: 20px; }
        .h-icon { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 13px; color: #fff; text-decoration: none; }
        .h-icon:hover { opacity: 1; }

        .container { width: 1000px; margin-top: 65px; display: flex; gap: 20px; }
        nav { width: 180px; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { padding: 8px 12px; color: #d1d1d1; cursor: pointer; font-size: 13px; border-radius: 4px; transition: 0.2s; }
        nav li:hover { background: #222; color: #fff; }
        nav li.active { background: #333; color: #fff; }

        main { flex-grow: 1; background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 4px; min-height: 500px; }

        /* Услуги */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .service-card { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .service-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .price { color: var(--accent); font-size: 20px; font-weight: bold; margin: 15px 0; }
        .btn-buy { background: var(--accent); border: none; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }

        .vktr-avatar-wrapper { position: relative; width: 130px; height: 130px; border: 1px solid #444; background: #222; }
        #main-ava { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-action { background: #222; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 12px; }
        .btn-action:hover { background: #333; border-color: #666; }

        @media (max-width: 768px) { .container { width: 95%; flex-direction: column; } nav { width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <div class="h-left">
            <img src="WhiteLogoVKTR.png" alt="VKTR" class="logo-img" onclick="showServices()">
            <div style="display: flex; gap: 15px; font-size: 13px; margin-left: 10px;">
                <span style="color: #666; cursor: default;">Поиск</span>
                <span style="color: #666; cursor: default;">Блог</span>
            </div>
        </div>
        <div class="h-right">
            <div class="h-icon" onclick="showServices()">🛒 Услуги</div>
            <div class="h-icon" onclick="showProfile()">👤 Кабинет</div>
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul id="nav-menu">
            <li id="m-services" onclick="showServices()">Лента услуг</li>
            <li id="m-profile" onclick="showProfile()">Мой профиль</li>
            <li onclick="window.location.href='errorunfinishedpage.html'">vktrСообщество</li>
            <li style="margin-top:20px; color:#666" onclick="location.href='login.html'">Выход</li>
        </ul>
    </nav>
    <main id="content">
        <h3>Загрузка ленты...</h3>
    </main>
</div>
