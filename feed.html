<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Control Panel</title>
    <style>
        :root { --accent: #e60000; --bg: #0b0b0b; --card: #121212; --header: #1a1a1a; --border: #282828; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        header { 
            position: fixed; top: 0; width: 100%; height: 52px; 
            background: var(--header); border-bottom: 1px solid var(--border); 
            display: flex; justify-content: center; z-index: 1000; 
        }
        .h-content { width: 1100px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .logo-box { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-img { height: 28px; }

        .container { width: 1100px; margin-top: 75px; display: flex; gap: 25px; padding: 0 20px; box-sizing: border-box; }
        
        nav { width: 220px; flex-shrink: 0; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { 
            padding: 10px 15px; color: #999; cursor: pointer; font-size: 14px; 
            border-radius: 6px; transition: 0.2s; margin-bottom: 4px;
        }
        nav li:hover { background: #1a1a1a; color: #fff; }
        nav li.active { background: var(--accent); color: #fff; }

        main { flex-grow: 1; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 8px; min-height: 600px; }

        /* Панель категорий */
        .category-bar { 
            display: flex; gap: 10px; margin-bottom: 25px; 
            border-bottom: 1px solid var(--border); padding-bottom: 15px; 
        }
        .cat-btn { 
            background: #1a1a1a; border: 1px solid var(--border); color: #888; 
            padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .cat-btn:hover { border-color: var(--accent); color: #fff; }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* Сетка услуг */
        .grid-system { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .module-card { 
            background: #1a1a1a; border: 1px solid var(--border); padding: 20px; 
            border-radius: 8px; transition: 0.3s; 
        }
        .module-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .price-tag { color: var(--accent); font-weight: bold; font-family: monospace; }
        
        .btn-action { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent); 
            width: 100%; padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 15px;
        }
        .btn-action:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <div class="logo-box" onclick="showSection('profile')">
            <img src="logo_vktr.png" alt="VKTR" class="logo-img">
        </div>
    </div>
</header>

<div class="container">
    <nav>
        <ul>
            <li id="m-profile" class="active" onclick="showSection('profile')">📋 Личный кабинет</li>
            <li id="m-services" onclick="showSection('services')">💎 Услуги VKTR</li>
            <li onclick="location.href='login.html'">Выйти</li>
        </ul>
    </nav>
    <main id="main-display"></main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // База данных услуг
    const servicesData = [
        { id: 1, cat: 'partnership', title: 'Партнёрство', desc: 'Официальное сотрудничество с VKTR Team.', price: 'Договорная' },
        { id: 2, cat: 'latest', title: 'Аудит Meowl Social', desc: 'Технический разбор обновления 04.05.2026.', price: '310 пузырей' },
        { id: 3, cat: 'first', title: 'Основы UI', desc: 'Тот самый первый гайд по дизайну портала.', price: 'Бесплатно' },
        { id: 4, cat: 'others', title: '3D Текстуры', desc: 'Создание кастомных материалов для проектов.', price: '150 пузырей' }
    ];

    onAuthStateChanged(auth, (user) => {
        if (user) { window.userEmail = user.email; showSection('profile'); }
        else { window.location.href = "login.html"; }
    });

    window.showSection = function(type) {
        const display = document.getElementById('main-display');
        document.querySelectorAll('nav li').forEach(li => li.classList.remove('active'));
        if (type === 'profile') {
            document.getElementById('m-profile').classList.add('active');
            display.innerHTML = `<h1>Личный кабинет</h1><p>Добро пожаловать в VKTR Core.</p>`;
        } else if (type === 'services') {
            document.getElementById('m-services').classList.add('active');
            renderServicesPage(display);
        }
    };

    function renderServicesPage(target) {
        target.innerHTML = `
            <div class="category-bar">
                <button class="cat-btn active" onclick="filterServices('all', this)">Все</button>
                <button class="cat-btn" onclick="filterServices('partnership', this)">Партнёрство</button>
                <button class="cat-btn" onclick="filterServices('latest', this)">Самый последний</button>
                <button class="cat-btn" onclick="filterServices('first', this)">Самый первый</button>
                <button class="cat-btn" onclick="filterServices('others', this)">Остальные</button>
            </div>
            <div class="grid-system" id="services-grid"></div>
        `;
        filterServices('all');
    }

    window.filterServices = function(category, btn) {
        if (btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        const grid = document.getElementById('services-grid');
        const filtered = category === 'all' ? servicesData : servicesData.filter(s => s.cat === category);
        
        grid.innerHTML = filtered.map(s => `
            <div class="module-card">
                <h4>${s.title}</h4>
                <p>${s.desc}</p>
                <span class="price-tag">${s.price}</span>
                <button class="btn-action">Запросить</button>
            </div>
        `).join('');
    };
</script>
</body>
</html>
