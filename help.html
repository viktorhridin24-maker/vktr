<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Справочный центр</title>
    <style>
        :root {
            --accent: #e60000;
            --bg: #0a0a0a;
            --card: rgba(12, 12, 12, 0.82);
            --card-border: rgba(255,255,255,0.07);
            --header-bg: rgba(10,10,10,0.92);
            --text: #f0f0f0;
            --text-muted: #999;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; margin: 0; min-height: 100vh; position: relative; }
        header { position: fixed; top: 0; width: 100%; height: 52px; background: var(--header-bg); border-bottom: 1px solid rgba(230,0,0,0.25); display: flex; justify-content: center; z-index: 1000; backdrop-filter: blur(14px); }
        .h-content { width: 1000px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .logo-img { height: 28px; cursor: pointer; }
        .container { width: 1000px; margin: 72px auto; display: flex; gap: 22px; }
        nav { width: 240px; }
        main { flex-grow: 1; background: var(--card); border: 1px solid var(--card-border); padding: 35px; border-radius: 10px; }
        h2 { font-size: 32px; margin: 0 0 20px 0; }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <div style="font-weight: bold; font-size: 18px;">VKTR Справка</div>
        <a href="feed.html" style="color: #999; text-decoration: none;">← Назад</a>
    </div>
</header>

<div class="container">
    <nav>
        <div style="background: var(--card); border: 1px solid var(--card-border); padding: 10px; border-radius: 8px;">
            <div style="color: #ff3333; font-weight: bold; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.06);">Разделы</div>
            <ul style="list-style: none; padding: 0; margin: 0;">
                <li style="padding: 10px; cursor: pointer; color: #999;">Регистрация</li>
                <li style="padding: 10px; cursor: pointer; color: #999;">Безопасность</li>
                <li style="padding: 10px; cursor: pointer; color: #999;">Профиль</li>
            </ul>
        </div>
    </nav>

    <main>
        <h2>Справочный центр</h2>
        <p>Добро пожаловать в справочный центр VKTR.</p>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    });
    const auth = getAuth(app);

    const IS_MAINTENANCE = false;

    onAuthStateChanged(auth, (user) => {
        const isBypass = localStorage.getItem('vktr_auth_bypass') === "true" || !user;
        if (user || isBypass) {
            localStorage.setItem('vktr_auth_bypass', 'true');
        } else {
            window.location.href = "login.html";
        }
    });
</script>

</body>
</html>
