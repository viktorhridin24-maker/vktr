<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход VKTR | Система</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Видео на задний план, как ты просил */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(40%); /* Чтобы текст читался */
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #ff0000; /* Дерзкий красный контур */
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
            text-align: center;
            width: 350px;
        }

        h1 { color: #ff0000; text-transform: uppercase; letter-spacing: 3px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* Кнопка в стиле видео-промо */
        .vktr-btn-red {
            background: #ff0000;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            box-shadow: 0 5px 0 #8b0000;
        }

        .vktr-btn-red:hover {
            background: #ff4d4d;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #8b0000;
        }

        .vktr-btn-red:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b0000;
        }
    </style>
</head>
<body>

    <!-- Видео на фоне -->
    <video autoplay muted loop id="bg-video">
        <source src="video_2026-04-30_20-33-28.mp4" type="video/mp4">
    </video>

    <div class="login-box">
        <h1>VKTR SYSTEM</h1>
        <input type="email" id="email" placeholder="ТВОЯ ПОЧТА">
        <button class="vktr-btn-red" onclick="handleLogin()">ЗАПУСТИТЬ РЕЛИЗ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
            authDomain: "vktrserver.firebaseapp.com",
            projectId: "vktrserver",
            appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const password = "vktr_pass_123"; 

            // Добавим проверку: если поле пустое, не пускаем дальше
            if (!email) {
                alert("Эй, почту введи!");
                return;
            }

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                // Если зашли — кидаем на проверку почты
                window.location.href = `accountaccept.html?email=${encodeURIComponent(email)}`;
            } catch (error) {
                console.error(error);
                alert("Ошибка! Либо почта не та, либо ты еще не в базе. Проверь регистрацию!");
            }
        };
    </script>
</body>
</html>
