<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>vktr - Твой путь к свободе</title>
    <link rel="stylesheet" href="style.css"> </head>
<body style="background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0;">

    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #333;">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/ТВОЙ_ПРОФИЛЬ/ТВОЙ_РЕПОЗИТОРИЙ/main/WhiteLogoVKTR.png" alt="vktr" style="height: 30px;">
        </div>
        <div class="auth-box">
            <input type="email" placeholder="Электронная почта" style="background: #111; border: 1px solid #333; color: #eee; padding: 5px;">
            <input type="text" placeholder="Ваш ID" style="background: #111; border: 1px solid #333; color: #eee; padding: 5px;">
            <button style="background: #ff0000; border: none; color: white; padding: 5px 15px; cursor: pointer; font-weight: bold;">ВХОД</button>
        </div>
    </header>

    <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center;">
        
        <div class="video-container" style="box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); border-radius: 10px; overflow: hidden; margin-bottom: 30px;">
            <video width="640" height="360" controls style="background: #111;">
                <source src="твой-ролик.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>

        <div class="action-buttons" style="display: flex; gap: 20px;">
            <button style="background: transparent; border: 2px solid #fff; color: #fff; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;">
                ОБУЧЕНИЕ VKTR
            </button>
            <button style="background: #fff; border: none; color: #000; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;">
                НАШЕ СООБЩЕСТВО
            </button>
        </div>

    </main>

    <div style="position: fixed; bottom: 20px; right: 20px; width: 100px;">
        <img src="hamster.png" alt="vktr helper" style="width: 100%;">
    </div>

</body>
</html>
