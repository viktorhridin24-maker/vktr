<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Главная</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Верхняя панель (Хедер) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #000;
        }

        .logo { font-weight: bold; font-size: 1.2rem; }

        .auth-bar { display: flex; gap: 10px; }

        .auth-bar input {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 5px 10px;
            border-radius: 2px;
        }

        .btn-login {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 5px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Центральная часть */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .video-container {
            width: 60%;
            max-width: 800px;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        video { width: 100%; display: block; }

        .action-buttons { display: flex; gap: 20px; }

        .btn-outline {
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
            padding: 10px 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-white {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Хомяк в углу */
        .helper-img {
            position: fixed;
            right: 20px;
            bottom: 80px;
            width: 100px;
        }

        .footer-logo {
            position: fixed;
            right: 20px;
            bottom: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">vktr</div>
    <div class="auth-bar">
        <input type="email" id="email" placeholder="Электронная почта">
        <input type="password" id="pass" placeholder="Ваш ID">
        <button class="btn-login" onclick="handleAuth()">ВХОД</button>
    </div>
</header>

<main>
    <div class="video-container">
        <video controls>
            <source src="video_2026-04-30_20-33-28.mp4" type="video/mp4">
        </video>
    </div>

    <div class="action-buttons">
        <button class="btn-outline">ОБУЧЕНИЕ VKTR</button>
        <button class="btn-white">НАШЕ СООБЩЕСТВО</button>
    </div>
</main>

<img src="hamster.png" class="helper-img" alt="helper"> <!-- Замени на своего хомяка -->
<div class="footer-logo">vktr helper</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvEL6OJH-Qheb8EISsY-jirt_Z8TLUoEU",
        authDomain: "vktrserver.firebaseapp.com",
        projectId: "vktrserver",
        appId: "1:305612049380:web:c0d6decb5d2448ad5195f1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.handleAuth = async () => {
        const email = document.getElementById('email').value.trim();
        const password = "GridikV15!"; // Или бери из поля 'Ваш ID'

        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "accountaccept.html";
        } catch (e) {
            alert("Ошибка входа! Проверь данные.");
        }
    }
</script>

</body>
</html>
