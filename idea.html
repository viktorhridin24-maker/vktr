<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKTR | Предложить идею</title>
    <style>
        :root { --accent: #e60000; --bg: #0a0a0a; --card: #161616; --header-bg: #222; }
        body { background: var(--bg); color: white; font-family: tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; height: 48px; background: var(--header-bg); border-bottom: 1px solid #444; display: flex; justify-content: center; position: fixed; top: 0; z-index: 100; }
        .h-content { width: 1000px; display: flex; align-items: center; padding: 0 15px; }
        .logo-img { height: 25px; cursor: pointer; }

        .main-container { width: 500px; margin-top: 80px; background: var(--card); border: 1px solid #333; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        h2 { margin-top: 0; font-weight: normal; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-size: 12px; color: #888; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 10px; background: #000; border: 1px solid #444; 
            color: white; border-radius: 4px; margin-top: 5px; box-sizing: border-box; font-family: inherit;
        }
        textarea { height: 120px; resize: none; }
        
        .btn-send { 
            background: var(--accent); color: white; border: none; padding: 12px; 
            width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.2s;
        }
        .btn-send:hover { background: #ff0000; }
        
        .back-link { display: block; text-align: center; margin-top: 15px; color: #555; text-decoration: none; font-size: 12px; }
        .back-link:hover { color: #888; }
    </style>
</head>
<body>

<header>
    <div class="h-content">
        <img src="WhiteLogoVKTR.png" class="logo-img" onclick="location.href='feed.html'">
    </div>
</header>

<div class="main-container">
    <h2>💡 Новая идея</h2>
    <p style="font-size: 13px; color: #777;">Опишите вашу задумку, и SYSTEM доставит её администратору.</p>

    <form id="ideaForm">
        <label>Название (ОБЯЗАТЕЛЬНО)</label>
        <input type="text" id="title" placeholder="Как назовем идею?" required>

        <label>Тип идеи</label>
        <select id="category">
            <option value="profile">Расширение в профиле</option>
            <option value="services">Новые услуги</option>
            <option value="design">Новый дизайн</option>
            <option value="other">Свой ответ</option>
        </select>

        <label>Описание идеи (ОБЯЗАТЕЛЬНО)</label>
        <textarea id="description" placeholder="Расскажите подробнее..." required></textarea>

        <button type="submit" class="btn-send">ОТПРАВИТЬ В SYSTEM</button>
    </form>

    <a href="feed.html" class="back-link">← Вернуться на портал</a>
</div>

<script>
    document.getElementById('ideaForm').onsubmit = function(e) {
        e.preventDefault();
        
        const idea = {
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            description: document.getElementById('description').value,
            status: "pending"
        };

        // Здесь будет логика отправки в Firebase, чтобы тебе пришло уведомление
        console.log("SYSTEM: Получена новая идея!", idea);
        
        alert("Идея успешно отправлена! SYSTEM уведомит вас о решении администратора.");
        location.href = 'feed.html';
    };
</script>

</body>
</html>
